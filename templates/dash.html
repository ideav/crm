<link rel="stylesheet" href="/css/dash.css?{_global_.version}">

<div id="dash-model" class="f-model m-2">
    <ul class="nav nav-tabs sheet-tabs"></ul>
    <div class="sheets"></div>
</div>

<!-- Formula editor modal -->
<div id="dash-formula-modal" role="dialog" aria-modal="true">
    <div class="dash-modal-box">
        <h6>Редактирование формулы</h6>
        <textarea id="dash-formula-textarea" rows="4"></textarea>
        <div class="dash-modal-btns">
            <button class="dash-apply-btn dash-btn-primary" id="dash-formula-save">Сохранить</button>
            <button class="dash-apply-btn dash-btn-secondary" id="dash-formula-cancel">Отменить</button>
        </div>
    </div>
</div>

<!-- Multiple values modal -->
<div id="dash-multival-modal" role="dialog" aria-modal="true">
    <div class="dash-modal-box">
        <h6>Найдено несколько значений</h6>
        <p id="dash-multival-subtitle"></p>
        <ul id="dash-multival-list"></ul>
        <div class="dash-modal-btns">
            <a id="dash-multival-link" href="#" target="_blank" style="font-size:0.85rem">Показать в таблице</a>
            <button class="dash-apply-btn" id="dash-multival-close">Закрыть</button>
        </div>
    </div>
</div>

<!-- Readonly tooltip -->
<div class="dash-readonly-tip" id="dash-readonly-tip">Только чтение</div>

<!-- Sum of selected cells -->
<div id="dash-selection-sum" aria-live="polite"></div>

<!-- Panel filter modal -->
<div id="dash-panel-filter-modal" role="dialog" aria-modal="true">
    <div class="dash-modal-box dash-panel-filter-modal-box">
        <h6>Фильтр панели</h6>
        <div id="dash-panel-filter-fields" class="dash-panel-filter-fields"></div>
        <div class="dash-modal-btns">
            <button class="dash-apply-btn dash-btn-primary" id="dash-panel-filter-apply">Применить</button>
            <button class="dash-apply-btn dash-btn-secondary" id="dash-panel-filter-reset">Сбросить</button>
            <button class="dash-apply-btn dash-btn-secondary" id="dash-panel-filter-cancel">Отменить</button>
        </div>
    </div>
</div>

<!-- Panel visualization settings modal -->
<div id="dash-viz-modal" role="dialog" aria-modal="true">
    <div class="dash-modal-box dash-viz-modal-box">
        <h6>Варианты отображения панели</h6>
        <ul class="dash-viz-tabs" role="tablist">
            <li class="dash-viz-tab active" data-viz-tab="panels" role="tab" aria-selected="true" tabindex="0">Диаграммы</li>
            <li class="dash-viz-tab" data-viz-tab="general" role="tab" aria-selected="false" tabindex="0">Общие настройки</li>
        </ul>
        <div class="dash-viz-tab-pane active" data-viz-tab-pane="panels">
            <div id="dash-viz-accordion" class="dash-viz-accordion"></div>
        </div>
        <div class="dash-viz-tab-pane" data-viz-tab-pane="general">
            <div id="dash-panel-general-settings" class="dash-panel-general-settings"></div>
        </div>
        <div class="dash-modal-btns">
            <button class="dash-apply-btn dash-btn-primary" id="dash-viz-save">Сохранить</button>
            <button class="dash-apply-btn dash-btn-secondary" id="dash-viz-cancel">Отменить</button>
        </div>
    </div>
</div>

<script src="/js/dash.js?{_global_.version}"></script>
