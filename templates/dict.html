<style>
:root {
    --dict-brand-primary: #1283da;
    --dict-brand-light: #419ce1;
    --dict-brand-soft: #ccdfff;
    --dict-brand-soft-strong: #a2ceef;
    --dict-brand-text: #4675ac;
    --dict-brand-hover-text: #ffffff;
    --dict-gradient-hover: linear-gradient(92.58deg, var(--dict-brand-light) 4.59%, var(--dict-brand-primary) 90.68%);
    --dict-gradient-active: linear-gradient(to right, #0e69ae, #0e69ae);
    --dict-shadow-hover: rgba(0, 97, 254, 0.21);
    --dict-highlight-bg: #ebf7ff;
    --dict-muted: #cccccc;
    --dict-category-new: #6c757d;
    --dict-sortable-border: #e4e4e6;
    --dict-sortable-bg: #ffffff;
    --dict-helper-shadow: rgba(128, 128, 128, 0.95);
    --dict-search-icon: var(--dict-brand-soft);
    --dict-icon-stroke: #1a1a1a;
    --dict-icon-fill: var(--dict-brand-soft-strong);
}

[data-theme="dark"] {
    --dict-brand-primary: #66b8f0;
    --dict-brand-light: #8acbf7;
    --dict-brand-soft: #2d4a70;
    --dict-brand-soft-strong: #4d79a8;
    --dict-brand-text: #8ebef0;
    --dict-brand-hover-text: #f8fbff;
    --dict-gradient-hover: linear-gradient(92.58deg, #2c6ea8 4.59%, #1a5490 90.68%);
    --dict-gradient-active: linear-gradient(to right, #154a76, #154a76);
    --dict-shadow-hover: rgba(0, 0, 0, 0.35);
    --dict-highlight-bg: #1e3146;
    --dict-muted: #6c7a89;
    --dict-category-new: #adb5bd;
    --dict-sortable-border: var(--border-color);
    --dict-sortable-bg: var(--bg-secondary);
    --dict-helper-shadow: rgba(0, 0, 0, 0.6);
    --dict-search-icon: #6f9fcc;
    --dict-icon-stroke: #d0d7de;
    --dict-icon-fill: #6f9fcc;
}

.dict-title{
    max-width: 900px;
    font-size: 45px;
    color: var(--dict-brand-primary);
	font-weight:100;
}
#addForm{
    max-width: 900px;
}
.dict-list{
    max-width: 900px;
    padding: 3px;
    display: flex;
    flex-wrap: wrap;
	padding-bottom: 35px;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
.dict-item {
    margin: 0 5px 0 5px;
    padding: 10px;
    margin: 7px;
    border-radius: 5px;
    /*transition: all 0.25s;*/
    cursor: pointer;
    text-align: center;
    border: 1px solid var(--dict-brand-soft);
}
.dict-exist {
    color: var(--dict-brand-text);
}
.dict-new {
    color: var(--dict-brand-primary);
    width: 40px;
    height: 40px;
    border: 1px solid var(--dict-brand-soft-strong);
    font-size: 35px;
    font-weight: lighter;
    border-radius: 3px;
    line-height: 0.6;
    text-align: center;

}

.dict-new:hover{
  background: var(--dict-gradient-hover);
  color: var(--dict-brand-hover-text);
}

.dict-new svg{
	fill: currentColor;
}

.dict-new:hover svg{
	fill: currentColor;
}

.dict-href{
    flex-grow: 1;
}
.dict-href:hover{
    text-decoration: none;
}
.dict-item:hover{
    background: var(--dict-gradient-hover);
    box-shadow: 0px 5px 7px var(--dict-shadow-hover);
    color: var(--dict-brand-hover-text);
}
.dict-item:active{
    border: 1px solid var(--dict-brand-primary);
    background: var(--dict-gradient-active);
}
.dictionary__search{
     padding-left: 10px;
    align-self: center;
    margin-left: auto;
    width: 300px;
    position: relative;
    color: var(--dict-search-icon);
}

@media (max-width: 560px) { 
	.dictionary__search{
     padding-left: 10px;
     align-self: center;
     margin-left: 0px;
	 margin-bottom:10px;
     width: 300px;
	}	
}

.dictionary__search input{
    border: 0;
    padding-left: 25px;

    line-height: 34px;
    font-size: 14px;

    mask-image: url("data:image/svg+xml,%3Csvg width='17' height='17' viewBox='0 0 17 17' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7.06814 0.125C3.23355 0.125 0.125 3.23355 0.125 7.06814C0.125 10.9027 3.23355 14.0113 7.06814 14.0113C8.66262 14.0113 10.1317 13.4741 11.3032 12.5717L16.0214 16.7286C16.2167 16.9238 16.5333 16.9238 16.7285 16.7286C16.9238 16.5333 16.9238 16.2167 16.7285 16.0215L12.2287 11.5216C13.1311 10.3502 13.6683 8.8811 13.6683 7.28662C13.6683 3.45203 10.5597 0.343479 6.72512 0.343479H7.06814V0.125ZM7.06814 1.125C10.3504 1.125 13.0113 3.78584 13.0113 7.06814C13.0113 10.3505 10.3504 13.0113 7.06814 13.0113C3.78584 13.0113 1.125 10.3505 1.125 7.06814C1.125 3.78584 3.78584 1.125 7.06814 1.125Z' fill='black'/%3E%3C/svg%3E");
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: 17px 17px;
    mask-size: 17px 17px;
    pointer-events: none;
}

.dictionary__search.search-active::before{
    left: auto;
    right: 10px;
}

.dict-category-edit input{

.create-btn {

}
.hidden {

}

.dict-title-box{
    display: flex;
    align-items: baseline;
    margin-top: 10px;
    flex-wrap: wrap;

}

.dict-category{

.dict-category-new{

}

.dict-category-new-input{
	display:none;

}

.chevron {
	transition: transform 0.3s ease-in-out;
	stroke: currentColor;
}

.dict-category .edit {
    display: none;
	cursor: pointer;
}

.dict-category:hover .edit {
   display: inline;
}

.dict-category .move {
	cursor: move;
	display: none;
}

.dict-category:hover .move {
   display: inline;
}

.rotate{
  transform: rotate(-90deg);
  stroke: var(--dict-muted)!important;
}

.inactive{
  color: var(--dict-muted)!important;
}

.dict-category-name{
	cursor:pointer;
}

.dict-category-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.dict-category-list li{
  list-style: none;
  margin: 0;
  padding: 0;
}

 .placeholder{
		border: 1px var(--dict-brand-primary);
		border-style: dotted;
		height:40px;
 }	

.highlight{
	 background-color: var(--dict-highlight-bg)!important;
}	

.dict-item-move{
	cursor:move;
}

.dict-category-sortable{
    border: 1px solid var(--dict-sortable-border);

.draggable-helper div{

.dict-category-point svg{

}

.dict-category-point svg path[stroke],
.dict-category-point svg [stroke]{

}

.dict-new svg{

</style>

<script>
function saveCatsConfig(){
    var conf={};
    $('.dict-category').each(function(){
        var i=$(this).find('.dict-category-name').html();
        conf[i]={"open":!$(this).hasClass('inactive'),"tabs":[]};
        $('[tabs-id='+$(this).attr('data-id')+']').find('a.dict-table').each(function(){
            conf[i].tabs.push($(this).attr('data-table-id'));
        });
    });
    console.log(JSON.stringify(conf));
    const vars = new FormData();
    vars.append('t273',JSON.stringify(conf));
    if(settingsID)
        newApi('POST','_m_save/'+settingsID+'?JSON','saveSet',vars,JSON.stringify(conf));
    else{
        vars.append('t269','{_global_.user}');
        vars.append('t271','UI');
        newApi('POST','_m_new/269?JSON&up=1','saveSet',vars,JSON.stringify(conf));
    }
}
function saveSet(json,vars){
    try{
        settingsID=json.obj;
    }
    catch(e){
        console.log(vars);
        localStorage.setItem('settingsID',vars);
    }
}
var defaultTablesSet='{"Избранное":{"open":true,"tabs":["18","42"]},"Справочники":{"open":false,"tabs":[]},"Служебные":{"open":false,"tabs":["22","269"]},"Скрытые":{"open":false,"tabs":["47","65","137","29","63"]}}'
    ,settingsID,i,tablesSet,myTablesSet={},j,tables={},tableTemplate=$('.dict-list').html();
$('.dict-table').remove();
var catTemplate=$('.dict-category-list').html();
$('.dict-category-point').remove();
<!-- Begin: &Settings -->
myTablesSet['{ID}']={'{TYPE}':'{SETTINGS}'.replace(/&quot;/g,'"')};
<!-- End: &Settings -->
for(i in myTablesSet){
    if(myTablesSet[i]['UI']){
        settingsID=i;
        try{
            tablesSet=JSON.parse(myTablesSet[i]['UI']);
            break;
        }
        catch(e){
            console.log(e);
        }
    }
}
if(tablesSet===undefined&&localStorage.getItem('settingsID'))
    try{
        tablesSet=tablesSet||JSON.parse(localStorage.getItem('settingsID'));
    }
    catch(e){
        console.log(e);
    }
tablesSet=tablesSet||JSON.parse(defaultTablesSet);

<!-- Begin:&Uni_obj_List -->tables[{ID}]={type:{TYPE},val:'{VAL}'};
<!-- End:&Uni_Obj_List -->
var n=0,tabList;
for(i in tablesSet){
    tabList='';
    $('.dict-category-list').append($(catTemplate.replace(':cat:',i)
                                                .replace(/:cat-id:/g,n)
                                                .replace('inactive',tablesSet[i].open?'':'inactive')));
    for(j in tablesSet[i].tabs)
        if(tables[tablesSet[i].tabs[j]])
            tabList+=tableTemplate.replace(':val:',tables[tablesSet[i].tabs[j]].val)
                                .replace(':type:',tables[tablesSet[i].tabs[j]].type)
                                .replace(/:id:/g,tablesSet[i].tabs[j]);
    $('[tabs-id="'+n+'"]').html($(tabList));
    n++;
}
tabList='';
for(i in tables)
    if($('a[data-table-id='+i+']').length===0)
        tabList+=tableTemplate.replace(':val:',tables[i].val)
                            .replace(':type:',tables[i].type)
                            .replace(/:id:/g,i);
$('[tabs-id=0]').append($(tabList));
$('.dict-category-new,.dict-category-list').show();
if('{_global_.role}'==='admin'){
    let str='<option value="" class="text-muted" selected>'+'Выберите тип первой колонки'+'</option>';
    str+='<option value="3">'+'Короткая строка (до 127 символов)'+'</option>';
    str+='<option value="8">'+'Строка без ограничения длины'+'</option>';
    str+='<option value="9">'+'Дата'+'</option>';
    str+='<option value="13">'+'Целое число'+'</option>';
    str+='<option value="14">'+'Число с десятичной частью'+'</option>';
    str+='<option value="11">'+'Логическое значение (Да / Нет)'+'</option>';
    str+='<option value="12">'+'Многострочный текст'+'</option>';
    str+='<option value="4">'+'Дата и время'+'</option>';
    document.getElementById('baseTypes').innerHTML=str;
    $('#createBtn').show();
}
const form = document.querySelector('#addForm');
$('#addForm').submit((e) => {
    e.preventDefault();
    const formData = new FormData(form);
    newApi('POST','_d_new?JSON','createNewTable',formData);
});
function createNewTable(json){
    if (json.id !== undefined) {
        document.location.href = "/{_global_.z}/object/" + json.obj
    } else {
        alert('Не удалось создать таблицу')
    }
}

//ajax
function changeCategoryOrderAjax(){
	let order = [];
	$('.dict-category-point').each(function(){
	   order.push($(this).find('.dict-category').data('id'));
	});
    saveCatsConfig();
}
// end ajax

function showNewCategoryInput(el){
	$(".dict-category-new-input").show();
	$(el).hide();
	$(".dict-category-new-input").find('input').focus();
}

function  hideNewCategoryInput(){
	$(".dict-category-new-input").hide();
	$(".dict-category-new").show();
	$(".dict-category-new-input").find('input').val("");
}

function newCategory(){
  if($('#new-category-input').val().trim()!== ''){
	
	let t=$(".dict-category-list li").last().clone();
	$(".dict-category-list").append(t); 
	
	t.find('.dict-category-name').html($('#new-category-input').val().trim());
	t.find('.dict-list').html("");
	
	t.find('.dict-category-name').on('click', function () {
        clickOnCategory(this)
     });

	 t.find('.chevron').on('click', function () {
        clickOnCategory(this)
     });

	t.droppable(dict_cat_drop);

	t.find('.move').on('mousedown', function() {
		if(!$(this).parent().hasClass('inactive')){
			$(this).parent().next('.dict-list').toggle();
		}
		$(this).parent().addClass('dict-category-sortable');
		$(document).on('mouseup.my-element', function(event) {
			  let el = $(".dict-category-sortable");
			  if(!el.hasClass('inactive')){
 					el.next('.dict-list').toggle();
			  }
			  el.removeClass("dict-category-sortable");
			  $(document).off('mouseup.my-element');
		});
	 
	 });
    
    let newCatId=$(".dict-category-list li").length-1;
	t.find('.dict-category').attr('data-id', newCatId);
	t.find('.dict-list').attr('tabs-id', newCatId);
	saveCatsConfig();
   
    $(".dict-category-new-input").find('input').val("");
	$(".dict-category-new-input").hide();
	$(".dict-category-new").show();
  }
}

function editCategory(category) {
  let categoryName = $(category).parent().text().trim();
  let id = $(category).parent().data('id');
  $(category).parent().after("<div class='dict-category-edit' id='edit" + id + "'><input id='eddd' type='text' value='" + categoryName + "'></div>");
  $(category).parent().hide();
  
  let input = $('#edit' + id).find('input');
  input.focus();
  input[0].setSelectionRange(input[0].value.length,input[0].value.length);
  input[0].selectionEnd = input[0].value.length;
  	
  input[0].scrollLeft = input[0].scrollWidth;

  input.keydown(function(event) {
	if (event.keyCode === 13) { 
      saveCategory(id);
    } else if (event.keyCode === 27) { 
      cancelEdit(id);
    }
  });
  input.blur(function() {
    saveCategory(id);
  });
}

function saveCategory(id) {
  const element = $('[data-id="' + id + '"]').children('.dict-category-name');
  let categoryName = $('#edit' + id).find('input').val().trim();
  if (categoryName) {
    element.html(categoryName);
	saveCatsConfig();
  } else {
    cancelEdit(id); 
  }

function filterTypes(){
    let value = document.querySelector('#val').value.toLowerCase()
    let type = document.querySelector('#baseTypes').value;
    if(value !== '' && type !== '')
        document.querySelector('#addbtn').removeAttribute('disabled');
    const dictItems = document.querySelectorAll('.dict-item');
    dictItems.forEach((item) => {
        if(item.textContent.toLowerCase().includes(value))
            $(item.parentElement).show();
        else
            $(item.parentElement).hide();
        if(item.textContent.toLowerCase()===value&&item.getAttribute('type')===type)
            document.querySelector('#addbtn').setAttribute('disabled','disabled');
    });
};

function layoutSwitcher(text) {
    const layoutMap = {
        'q': 'й', 'w': 'ц', 'e': 'у', 'r': 'к', 't': 'е', 'y': 'н', 'u': 'г', 'i': 'ш',
        'o': 'щ', 'p': 'з', '[': 'х', ']': 'ъ', 'a': 'ф', 's': 'ы', 'd': 'в', 'f': 'а',
        'g': 'п', 'h': 'р', 'j': 'о', 'k': 'л', 'l': 'д', ';': 'ж', "'": 'э', 'z': 'я',
        'x': 'ч', 'c': 'с', 'v': 'м', 'b': 'и', 'n': 'т', 'm': 'ь', ',': 'б', '.': 'ю',
        '/': '.', 'й': 'q', 'ц': 'w', 'у': 'e', 'к': 'r', 'е': 't', 'н': 'y', 'г': 'u',
        'ш': 'i', 'щ': 'o', 'з': 'p', 'х': '[', 'ъ': ']', 'ф': 'a', 'ы': 's', 'в': 'd',
        'а': 'f', 'п': 'g', 'р': 'h', 'о': 'j', 'л': 'k', 'д': 'l', 'ж': ';', 'э': "'",
        'я': 'z', 'ч': 'x', 'с': 'c', 'м': 'v', 'и': 'b', 'т': 'n', 'ь': 'm', 'б': ',',
        'ю': '.', '.': '/'
    };
    return text.split('').map(char => layoutMap[char] || char).join('');
}

function isSubstring(str, substr) {
    
	const lowerStr = str.toLowerCase();
    const lowerSubStr = substr.toLowerCase();

	let k = lowerStr.indexOf(lowerSubStr);
	if(k !== -1 ) return k;
    
	const alternativeSubstr = layoutSwitcher(lowerSubStr);
    k = lowerStr.indexOf(alternativeSubstr);
	if(k !== -1 ) return k;
	
	return -1;	
}


$('#dictionary__search').on('keyup', function() {
	let searchValue = $(this).val();
  
	$('.dict-item').each(function() {
	    let elementText = $(this).data('originaltext') || $(this).text();
		elementText = elementText.toString();
		let index = isSubstring(elementText, searchValue)
    
		if (index === -1) {
			$(this).parent().hide();
		} else {
			$(this).parent().show();
			if ($(this).parent().parent(".dict-list").prev('.dict-category').hasClass('inactive') && searchValue !== '') {
		        $(this).parent().parent().toggle();
			    $(this).parent().parent(".dict-list").prev('.dict-category').find('.chevron').toggleClass('rotate');
				$(this).parent().parent(".dict-list").prev('.dict-category').toggleClass('inactive');
			}
      
			let html ="";
			if(!$(this).data('originaltext')){
				html = $(this).html();
				$(this).attr('data-originaltext', html);
			}else{
				html = $(this).data('originaltext').toString();	
			}	
			html = html.substring(0, index) + '<b>' + html.substring(index, index + searchValue.length) + '</b>' + html.substring(index + searchValue.length);
			$(this).html(html);
		}
  });
});
