        }
    </style>
    <script>
        // Font size control — global, stored in cookie integram-table-font-settings (issue #1626/#1628)
        (function() {
            var FONT_COOKIE = 'integram-table-font-settings';
            var SIZE_MAP = { smaller: '.7rem', normal: '.82rem', larger: '.95rem' };

            function applyPageFontSize(size) {
                var value = SIZE_MAP[size] || SIZE_MAP.normal;
                document.documentElement.style.fontSize = value;
            }

            function loadPageFontSize() {
                var match = document.cookie.match(new RegExp('(?:^|; )' + FONT_COOKIE.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
                if (match) {
                    try {
                        var settings = JSON.parse(decodeURIComponent(match[1]));
                        return settings.pageFontSize || 'normal';
                    } catch (e) {}
                }
                return 'normal';
            }

            // Apply stored font size immediately (before DOM render)
            applyPageFontSize(loadPageFontSize());

            window.setPageFontSize = function(size) {
                document.cookie = FONT_COOKIE + '=' + encodeURIComponent(JSON.stringify({ pageFontSize: size })) + '; path=/; max-age=31536000';
                applyPageFontSize(size);
                // Update active state on font size buttons
                document.querySelectorAll('.navbar-font-size-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.size === size);
                });
            };

            // After DOM ready: mark the correct button as active
            document.addEventListener('DOMContentLoaded', function() {
                var current = loadPageFontSize();
                document.querySelectorAll('.navbar-font-size-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.size === current);
                });
            });
        })();
    </script>
    <script>
        // Brand background opacity — stored in cookie (issue #1897, #1899)
        (function() {
            var BG_COOKIE = 'brand-bg-{_global_.z}';

            function applyBrandBg(value) {
                var opacity = parseFloat(value);
                if (opacity > 0 && opacity <= 0.9) {
                    document.documentElement.style.setProperty('--brand-bg-opacity', opacity);
                    if (document.body) document.body.classList.add('brand-bg-on');
                } else {
                    document.documentElement.style.removeProperty('--brand-bg-opacity');
                    if (document.body) document.body.classList.remove('brand-bg-on');
                }
            }

            function loadBrandBg() {
                var match = document.cookie.match(new RegExp('(?:^|; )' + BG_COOKIE.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
                return match ? decodeURIComponent(match[1]) : '0';
            }

            // Apply immediately before DOM renders
            applyBrandBg(loadBrandBg());

            window.setBrandBg = function(value) {
                document.cookie = BG_COOKIE + '=' + encodeURIComponent(value) + '; path=/; max-age=31536000';
                applyBrandBg(value);
                var sel = document.getElementById('brand-bg-select');
                if (sel) sel.value = value;
            };

            document.addEventListener('DOMContentLoaded', function() {
                var current = loadBrandBg();
                applyBrandBg(current);
                var sel = document.getElementById('brand-bg-select');
                if (sel) sel.value = current;
            });
        })();
    </script>

    <script>
        (function() {
            var dbName = '{_global_.z}' || 'default';
            var storageKey = 'appSidebarCollapsed_' + dbName;
            var cookieName = 'sidebarWidth_' + dbName;
            var isCollapsed = localStorage.getItem(storageKey) === 'true';
            var savedWidth = null;
            var match = document.cookie.match(new RegExp('(?:^|; )' + cookieName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
            if (match) savedWidth = decodeURIComponent(match[1]);
            // Apply sidebar state via CSS before the DOM renders to prevent flash/jump
            var cssRules = '.app-sidebar{transition:none!important;}';
            if (isCollapsed) {
                cssRules += '.app-sidebar{width:56px!important;}';
            } else if (savedWidth) {
                cssRules += '.app-sidebar{width:' + parseInt(savedWidth, 10) + 'px!important;}';
            }
            var el = document.createElement('style');
            el.id = 'sidebar-init-style';
            el.textContent = cssRules;
            document.head.appendChild(el);
        })();
    </script>

    <script>
    function changePwd(){
        var oldPwd=document.getElementById('old-pwd').value,
            newPwd=document.getElementById('new-pwd').value,
            newAgain=document.getElementById('new-again').value;
        if(oldPwd===''||newPwd===''||newAgain==='')
            return changeMsg('alert-danger','Заполните все поля');
        document.querySelectorAll('.ch-toggle').forEach(function(el){el.style.display='none';});
        document.querySelectorAll('.wait-toggle').forEach(function(el){el.style.display='block';});
        var obj=new XMLHttpRequest();
        obj.open('POST','/'+db+'/auth?JSON',true);
        obj.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
        obj.onload=function(){
            document.querySelectorAll('.ch-toggle').forEach(function(el){el.style.display='flex';});
            document.querySelectorAll('.wait-toggle').forEach(function(el){el.style.display='none';});
            var json;
            try{json=JSON.parse(this.responseText);}
            catch(e){console.log(e);document.getElementById('pwdchangemsg').innerHTML=this.responseText;}
            if(json&&json.msg){
                if(json.msg.indexOf('[err')===-1){
                    changeMsg('alert-success',json.msg);
                    document.getElementById('old-pwd').value='';
                    document.getElementById('new-pwd').value='';
                    document.getElementById('new-again').value='';
                }else
                    changeMsg('alert-danger',json.msg.replace(/ ?\[.+\]/,''));
                if(json.token)token=json.token;
                if(json.xsrf)xsrf=json.xsrf;
            }else
                changeMsg('alert-danger','Неверный пароль');
        };
        obj.send('change=1&login='+user+'&pwd='+encodeURIComponent(oldPwd)+'&npw1='+encodeURIComponent(newPwd)+'&npw2='+encodeURIComponent(newAgain));
    }
    function changeMsg(cl,msg){
        var el=document.getElementById('pwdchangemsg');
        el.className='alert w-100 '+cl;
        el.innerHTML=msg;
        el.style.display='block';
        setTimeout(function(){
            el.style.transition='opacity 0.4s';
            el.style.opacity='0';
            setTimeout(function(){el.style.display='none';el.style.opacity='';el.style.transition='';},400);
        },4500);
    }
    </script>

    <!-- Change Password Modal -->
    <div class="cp-form" style="display: none; position: fixed; top: 0; left: 0; height: 100%; width: 100%; z-index: 9999; background: rgba(0,0,0,.4);" onclick="this.style.display='none';">
        <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
            <div style="border-radius: 8px; background-color: #fff; max-width: 360px; width: 100%; padding: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,.18);" onclick="event.stopPropagation();" onkeyup="if(event.keyCode===13)changePwd()">
                <div style="text-align:center; margin-bottom:1rem;">
                    <h5 style="margin:0;">Смена пароля</h5>
                </div>
                <div id="pwdchangemsg" class="alert w-100" style="display: none;"></div>
                <label for="old-pwd" style="margin-bottom:0.25rem; display:block;">Действующий пароль</label>
                <input type="password" id="old-pwd" style="border: 1px solid lightgray; margin-bottom: 0.75rem; padding: 0.375rem 0.5rem; width: 100%; border-radius: 4px; box-sizing:border-box;">
                <label for="new-pwd" style="margin-bottom:0.25rem; display:block;">Новый пароль</label>
                <input type="password" id="new-pwd" style="border: 1px solid lightgray; margin-bottom: 0.75rem; padding: 0.375rem 0.5rem; width: 100%; border-radius: 4px; box-sizing:border-box;">
                <label for="new-again" style="margin-bottom:0.25rem; display:block;">Повторите пароль</label>
                <input type="password" id="new-again" style="border: 1px solid lightgray; margin-bottom: 1rem; padding: 0.375rem 0.5rem; width: 100%; border-radius: 4px; box-sizing:border-box;">
                <div style="text-align:center; display:none;" class="wait-toggle"><img src="/i/ajax.gif"></div>
                <div style="display: flex; gap: 0.5rem;" class="ch-toggle">
                    <button style="flex:1; padding:0.5rem; background:#3b82f6; color:#fff; border:none; border-radius:6px; cursor:pointer;" type="button" onclick="changePwd()">Сменить</button>
                    <button style="flex:1; padding:0.5rem; background:#fff; color:#333; border:1px solid #ccc; border-radius:6px; cursor:pointer;" type="button" onclick="document.querySelector('.cp-form').style.display='none';">Отменить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cookie Consent Banner -->
    <div id="cookie-consent">
        <span style="font-size:0.9rem;">Мы используем куки для обеспечения работы сайта. Продолжая использовать сайт, вы соглашаетесь с их использованием.</span>
        <button type="button" onclick="cookieAccept()" style="background:#3b82f6; color:#fff; border:none; border-radius:6px; padding:0.5rem 1.25rem; font-size:0.9rem; cursor:pointer; white-space:nowrap;">Принять</button>
    </div>
    <script>
        (function() {
            if (!localStorage.getItem('cookie_consent')) {
                document.getElementById('cookie-consent').style.display = 'flex';
            }
        })();
        function cookieAccept() {
            localStorage.setItem('cookie_consent', '1');
            document.getElementById('cookie-consent').style.display = 'none';
        }
    </script>
