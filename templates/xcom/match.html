<link rel="stylesheet" href="/css/xcom-match.css?0{_global_.version}">

<div id="xcom-match-app"
     class="xcom-match"
     data-db="{_global_.z}"
     data-sku-table="2032189"
     data-match-report="Сопоставление">
    <section class="xcom-match-search-panel" aria-label="Поиск SKU для строки RFP">
        <form id="xcom-match-search-form" class="xcom-match-search-form">
            <div class="xcom-match-search-head">
                <div>
                    <h1>Подбор SKU</h1>
                    <p>Поиск по первым трем полям таблицы sku</p>
                </div>
                <div class="xcom-match-actions">
                    <button id="xcom-match-reset" class="xcom-match-btn xcom-match-btn-secondary" type="button" title="Очистить">
                        <i class="pi pi-times"></i>
                        <span>Очистить</span>
                    </button>
                    <button class="xcom-match-btn xcom-match-btn-primary" type="submit" title="Найти">
                        <i class="pi pi-search"></i>
                        <span>Найти</span>
                    </button>
                </div>
            </div>
            <div id="xcom-match-fields" class="xcom-match-fields">
                <div class="xcom-match-loading">
                    <span class="xcom-match-spinner"></span>
                    <span>Загрузка полей SKU...</span>
                </div>
            </div>
        </form>
    </section>

    <div class="xcom-match-grid">
        <section class="xcom-match-pane" aria-labelledby="xcom-match-sku-title">
            <div class="xcom-match-pane-head">
                <div>
                    <h2 id="xcom-match-sku-title">Найденные SKU</h2>
                    <span id="xcom-match-sku-summary" class="xcom-match-summary">До 20 записей</span>
                </div>
            </div>
            <div id="xcom-match-sku-results" class="xcom-match-table-wrap">
                <div class="xcom-match-empty">Введите данные строки RFP и нажмите «Найти».</div>
            </div>
        </section>

        <section class="xcom-match-pane" aria-labelledby="xcom-match-report-title">
            <div class="xcom-match-pane-head">
                <div>
                    <h2 id="xcom-match-report-title">Результаты сопоставления</h2>
                    <span id="xcom-match-report-summary" class="xcom-match-summary">Выберите SKU из списка</span>
                </div>
            </div>
            <div id="xcom-match-report-results" class="xcom-match-table-wrap">
                <div class="xcom-match-empty">Выберите строку SKU слева, чтобы подобрать сопоставление.</div>
            </div>
        </section>
    </div>
</div>

<script src="/js/xcom-match.js?0{_global_.version}" defer></script>
