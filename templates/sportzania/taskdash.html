<style>
    .taskdash {
        --taskdash-blue: #2563eb;
        --taskdash-green: #16a34a;
        --taskdash-amber: #d97706;
        --taskdash-red: #dc2626;
        --taskdash-cyan: #0891b2;
        --taskdash-soft-blue: rgba(37, 99, 235, 0.10);
        --taskdash-soft-green: rgba(22, 163, 74, 0.11);
        --taskdash-soft-amber: rgba(217, 119, 6, 0.12);
        --taskdash-soft-red: rgba(220, 38, 38, 0.10);
        min-height: 100%;
        padding: 16px;
        background: var(--bg-primary, #f8fafc);
        color: var(--text-primary, #111827);
        box-sizing: border-box;
    }

    .taskdash * {
        box-sizing: border-box;
    }

    .taskdash__topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
    }

    .taskdash__title {
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--text-primary, #111827);
    }

    .taskdash__status {
        min-height: 1.2rem;
        margin-top: 5px;
        color: var(--text-secondary, #64748b);
        font-size: 0.86rem;
    }

    .taskdash-filter-panel {
        border: 1px solid var(--border-color, #d6dee8);
        border-radius: 8px;
        background: var(--card-bg, #fff);
        padding: 10px 12px;
        margin-bottom: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
    }

    .taskdash-filter-grid {
        display: grid;
        grid-template-columns: minmax(260px, 0.95fr) repeat(2, minmax(150px, 0.55fr));
        gap: 8px;
        align-items: end;
    }

    .taskdash-filter {
        min-width: 0;
    }

    .taskdash-filter label {
        display: block;
        margin-bottom: 4px;
        color: var(--text-secondary, #64748b);
        font-size: 0.74rem;
        font-weight: 600;
    }

    .taskdash-filter input,
    .taskdash-filter select {
        width: 100%;
        min-height: 32px;
        border: 1px solid var(--input-border, #cbd5e1);
        border-radius: 7px;
        background: var(--input-bg, #fff);
        color: var(--text-primary, #111827);
        padding: 5px 8px;
        font: inherit;
        font-size: 0.84rem;
    }

    .taskdash-filter input:focus,
    .taskdash-filter select:focus {
        outline: 2px solid rgba(37, 99, 235, 0.20);
        border-color: var(--taskdash-blue);
    }

    .taskdash-range {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
    }

    .taskdash-filter__quick {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        margin-top: 8px;
    }

    .taskdash-quick-link {
        color: var(--taskdash-blue);
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.2;
        text-decoration-line: underline;
        text-decoration-style: dashed;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
    }

    .taskdash-quick-link:hover,
    .taskdash-quick-link:focus {
        color: #1d4ed8;
        outline: none;
    }

    .taskdash-filter-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin: 0;
    }

    .taskdash-btn {
        min-height: 32px;
        border: 1px solid var(--border-color, #d6dee8);
        border-radius: 7px;
        background: var(--card-bg, #fff);
        color: var(--text-primary, #111827);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 5px 10px;
        cursor: pointer;
        font: inherit;
        font-size: 0.84rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .taskdash-btn:hover {
        border-color: var(--taskdash-blue);
        color: var(--taskdash-blue);
    }

    .taskdash-kpis {
        display: grid;
        grid-template-columns: repeat(6, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
    }

    .taskdash-kpi {
        min-width: 0;
        border: 1px solid var(--border-color, #d6dee8);
        border-radius: 8px;
        background: var(--card-bg, #fff);
        padding: 12px;
    }

    .taskdash-kpi__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--text-secondary, #64748b);
        font-size: 0.78rem;
        font-weight: 600;
    }

    .taskdash-kpi__icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .taskdash-kpi__icon--total { background: var(--taskdash-soft-blue); color: var(--taskdash-blue); }
    .taskdash-kpi__icon--done { background: var(--taskdash-soft-green); color: var(--taskdash-green); }
    .taskdash-kpi__icon--active { background: rgba(8, 145, 178, 0.12); color: var(--taskdash-cyan); }
    .taskdash-kpi__icon--overdue { background: var(--taskdash-soft-red); color: var(--taskdash-red); }
    .taskdash-kpi__icon--delayed { background: var(--taskdash-soft-amber); color: var(--taskdash-amber); }
    .taskdash-kpi__value {
        margin-top: 8px;
        font-size: 1.35rem;
        line-height: 1.1;
        font-weight: 750;
        color: var(--text-primary, #111827);
        overflow-wrap: anywhere;
    }

    .taskdash-kpi__note {
        margin-top: 4px;
        color: var(--text-secondary, #64748b);
        font-size: 0.78rem;
    }

    .taskdash-grid {
        display: grid;
        grid-template-columns: minmax(300px, 0.95fr) minmax(360px, 1.25fr);
        gap: 14px;
        align-items: start;
    }

    .taskdash-panel {
        border: 1px solid var(--border-color, #d6dee8);
        border-radius: 8px;
        background: var(--card-bg, #fff);
        min-width: 0;
    }

    .taskdash-panel__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 12px 0;
    }

    .taskdash-panel__title {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.25;
        font-weight: 700;
        color: var(--text-primary, #111827);
    }

    .taskdash-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        color: var(--text-secondary, #64748b);
        font-size: 0.78rem;
    }

    .taskdash-legend span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .taskdash-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        display: inline-block;
    }

    .taskdash-dot--done { background: var(--taskdash-green); }
    .taskdash-dot--active { background: var(--taskdash-cyan); }
    .taskdash-dot--overdue { background: var(--taskdash-red); }
    .taskdash-dot--delayed { background: var(--taskdash-amber); }

    .taskdash-chart {
        padding: 12px;
    }

    .taskdash-bars {
        height: 260px;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(42px, 1fr);
        gap: 10px;
        align-items: end;
        overflow-x: auto;
        padding: 10px 2px 0;
    }

    .taskdash-bar-wrap {
        min-width: 42px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 6px;
        height: 100%;
        align-items: end;
    }

    .taskdash-bar-total {
        color: var(--text-secondary, #64748b);
        font-size: 0.75rem;
        text-align: center;
        min-height: 1rem;
    }

    .taskdash-bar {
        width: min(34px, 100%);
        height: 100%;
        justify-self: center;
        display: flex;
        flex-direction: column-reverse;
        border-radius: 7px 7px 3px 3px;
        overflow: hidden;
        background: var(--bg-secondary, #eef2f7);
    }

    .taskdash-bar-segment {
        min-height: 0;
        transition: height 0.2s;
    }

    .taskdash-bar-segment--done { background: var(--taskdash-green); }
    .taskdash-bar-segment--active { background: var(--taskdash-cyan); }
    .taskdash-bar-segment--overdue { background: var(--taskdash-red); }
    .taskdash-bar-segment--delayed { background: var(--taskdash-amber); }

    .taskdash-bar-label {
        color: var(--text-secondary, #64748b);
        font-size: 0.72rem;
        text-align: center;
        line-height: 1.15;
        min-height: 2rem;
    }

    .taskdash-table-panel {
        overflow: hidden;
    }

    .taskdash-table-wrap {
        max-height: 520px;
        overflow: auto;
        margin-top: 10px;
    }

    .taskdash-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.86rem;
        min-width: 760px;
    }

    .taskdash-table th,
    .taskdash-table td {
        border-bottom: 1px solid var(--border-color, #e2e8f0);
        padding: 8px 10px;
        text-align: left;
        vertical-align: middle;
        background: var(--card-bg, #fff);
    }

    .taskdash-table th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--bg-secondary, #f1f5f9);
        color: var(--text-secondary, #475569);
        font-weight: 700;
        white-space: nowrap;
    }

    .taskdash-table th button {
        border: none;
        background: transparent;
        color: inherit;
        padding: 0;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        font: inherit;
        font-weight: inherit;
    }

    .taskdash-table tbody tr:hover td {
        background: var(--bg-secondary, #f8fafc);
    }

    .taskdash-table .taskdash-number {
        text-align: right;
        font-variant-numeric: tabular-nums;
    }

    .taskdash-status-pill {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        min-height: 24px;
        border-radius: 999px;
        padding: 2px 8px;
        background: var(--taskdash-soft-blue);
        color: var(--taskdash-blue);
        font-size: 0.78rem;
        font-weight: 700;
        white-space: nowrap;
    }

    .taskdash-status-pill--done {
        background: var(--taskdash-soft-green);
        color: var(--taskdash-green);
    }

    .taskdash-status-pill--active {
        background: rgba(8, 145, 178, 0.12);
        color: var(--taskdash-cyan);
    }

    .taskdash-status-pill--delayed {
        background: var(--taskdash-soft-red);
        color: var(--taskdash-red);
    }

    .taskdash-empty,
    .taskdash-error {
        min-height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary, #64748b);
        text-align: center;
        padding: 24px;
    }

    .taskdash-error {
        color: var(--taskdash-red);
    }

    .taskdash-loading {
        opacity: 0.65;
        pointer-events: none;
    }

    [data-theme="dark"] .taskdash {
        --taskdash-soft-blue: rgba(59, 130, 246, 0.18);
        --taskdash-soft-green: rgba(34, 197, 94, 0.16);
        --taskdash-soft-amber: rgba(245, 158, 11, 0.17);
        --taskdash-soft-red: rgba(248, 113, 113, 0.15);
    }

    @media (max-width: 1120px) {
        .taskdash-filter-panel {
            grid-template-columns: 1fr;
        }

        .taskdash-filter-grid {
            grid-template-columns: minmax(240px, 1fr) repeat(2, minmax(150px, 0.7fr));
        }

        .taskdash-kpis {
            grid-template-columns: repeat(3, minmax(130px, 1fr));
        }

        .taskdash-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 720px) {
        .taskdash {
            padding: 12px;
        }

        .taskdash__topbar {
            flex-direction: column;
        }

        .taskdash-kpis {
            grid-template-columns: 1fr 1fr;
        }

        .taskdash-filter-grid {
            grid-template-columns: 1fr;
        }

        .taskdash-filter-actions {
            justify-content: stretch;
        }

        .taskdash-btn {
            flex: 1 1 auto;
        }
    }

    @media (max-width: 460px) {
        .taskdash-kpis {
            grid-template-columns: 1fr;
        }

        .taskdash-range {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="taskdash" id="taskdash-root">

</section>

<script>
(function() {
    const TASKDASH_REPORT_ID = '155675';
    const TASKDASH_FILTER_NAMES = ['месяц', 'департамент', 'статус задачи'];
    const TASKDASH_FALLBACK_COLUMNS = [
        { id: '155682', type: '', format: 'SHORT', name: 'Месяц' },
        { id: '155679', type: '2953', format: 'SHORT', name: 'Департамент', granted: 1, ref: 1, orig: '2859' },
        { id: '155680', type: '', format: 'SHORT', name: 'Просрочена' },
        { id: '155683', type: '', format: 'SHORT', name: 'Отложена' },
        { id: '155684', type: '', format: 'SHORT', name: 'Завершена' },
        { id: '155685', type: '', format: 'SHORT', name: 'В работе' },
        { id: '155721', type: '', format: 'SHORT', name: 'Сотрудников' },
        { id: '155724', type: '8907', format: 'SHORT', name: 'Статус задачи', granted: 1, ref: 1, orig: '2685' }
    ];

    var taskdashState = {
        columns: TASKDASH_FALLBACK_COLUMNS.map(taskdashNormalizeColumn),
        rows: [],
        filters: {},
        sort: { columnId: '155682', dir: 'asc' },
        loading: false
    };

    function taskdashNormalizeResponse(payload) {
        var columns = [], rows = [], i, j, row, keys, data;
        if (payload && Array.isArray(payload.columns)) {
            columns = payload.columns.map(taskdashNormalizeColumn);
        }

        data = payload && Array.isArray(payload.data) ? payload.data : null;
        if (columns.length && data && data.every(Array.isArray)) {
            var isColumnMajor = data.length === columns.length;
            if (isColumnMajor) {
                var rowCount = data.reduce(function(max, values) {
                    return Math.max(max, values.length);
                }, 0);
                for (i = 0; i < rowCount; i++) {
                    row = {};
                    for (j = 0; j < columns.length; j++) {
                        row[columns[j].name] = taskdashValueAt(data[j], i);
                    }
                    rows.push(row);
                }
            } else {
                for (i = 0; i < data.length; i++) {
                    row = {};
                    for (j = 0; j < columns.length; j++) {
                        row[columns[j].name] = taskdashValueAt(data[i], j);
                    }
                    rows.push(row);
                }
            }
        } else if (Array.isArray(payload)) {
            rows = payload.map(function(item) {
                return item && typeof item === 'object' ? Object.assign({}, item) : { value: item };
            });
        } else if (payload && Array.isArray(payload.data)) {
            rows = payload.data.map(function(item) {
                return item && typeof item === 'object' ? Object.assign({}, item) : { value: item };
            });
        }

        if (!columns.length && rows.length) {
            keys = [];
            rows.forEach(function(item) {
                Object.keys(item || {}).forEach(function(key) {
                    if (keys.indexOf(key) === -1) keys.push(key);
                });
            });
            columns = keys.map(function(key, index) {
                return taskdashNormalizeColumn({ id: key || String(index), name: key || ('Поле ' + (index + 1)) }, index);
            });
        }

        return { columns: columns, rows: rows };
    }

    function taskdashNormalizeColumn(column, index) {
        var raw = column || {};
        if (typeof raw !== 'object') raw = { id: index, name: String(raw || '') };
        var name = raw.name || raw.val || raw.title || raw.id || ('Поле ' + ((index || 0) + 1));
        return {
            id: String(raw.id || name || index || ''),
            name: String(name),
            type: raw.type || '',
            format: raw.format || '',
            ref: raw.ref || '',
            orig: raw.orig || '',
            granted: raw.granted || ''
        };
    }

    function taskdashValueAt(values, index) {
        if (!Array.isArray(values)) return '';
        return values[index] === undefined || values[index] === null ? '' : values[index];
    }

    function taskdashFindColumn(columns, names) {
        var list = Array.isArray(names) ? names : [names];
        var normalized = list.map(function(name) {
            return String(name || '').toLowerCase();
        });
        var exact = columns.find(function(column) {
            return normalized.indexOf(String(column.name || '').toLowerCase()) !== -1;
        });
        if (exact) return exact;
        return columns.find(function(column) {
            var name = String(column.name || '').toLowerCase();
            return normalized.some(function(part) {
                return part && name.indexOf(part) !== -1;
            });
        }) || null;
    }

    function taskdashParseNumber(value) {
        if (value && typeof value === 'object') value = value.val || value.value || '';
        if (value === null || value === undefined || value === '') return NaN;
        var cleaned = String(value)
            .replace(/\u00a0/g, ' ')
            .replace(/\s/g, '')
            .replace(',', '.')
            .replace(/[^\d.-]/g, '');
        if (!cleaned || cleaned === '-' || cleaned === '.') return NaN;
        return parseFloat(cleaned);
    }

    function taskdashParseDateValue(value) {
        if (value && typeof value === 'object') value = value.val || value.value || '';
        var text = String(value || '').trim();
        var match;
        if (!text) return null;
        match = text.match(/^(\d\d\d\d)(\d\d)(\d\d)$/);
        if (match) return { year: match[1], month: match[2], day: match[3] };
        match = text.match(/^(\d\d\d\d)-(\d\d)-(\d\d)/);
        if (match) return { year: match[1], month: match[2], day: match[3] };
        match = text.match(/^(\d\d)\.(\d\d)\.(\d\d\d\d)/);
        if (match) return { year: match[3], month: match[2], day: match[1] };
        return null;
    }

    function taskdashMonthKey(value) {
        var parsed = taskdashParseDateValue(value);
        return parsed ? parsed.year + '-' + parsed.month : '';
    }

    function taskdashMonthLabel(key) {
        var months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
        var parts = String(key || '').split('-');
        var monthIndex = parseInt(parts[1], 10) - 1;
        if (parts.length !== 2 || monthIndex < 0 || monthIndex > 11) return key || '';
        return months[monthIndex] + ' ' + parts[0];
    }

    function taskdashFormatDateForApi(value) {
        var text = String(value || '').trim();
        var match = text.match(/^(\d\d\d\d)-(\d\d)-(\d\d)$/);
        if (match) return match[3] + '.' + match[2] + '.' + match[1];
        return text;
    }

    function taskdashEncodeParam(value) {
        return encodeURIComponent(String(value || ''));
    }

    function taskdashFilterKey(prefix, column) {
        return prefix + (prefix.slice(-1) === '_' ? '' : '_') + (column ? column.name : '');
    }

    function taskdashIsStatusColumn(column) {
        return String(column && column.name || '').trim().toLowerCase() === 'статус задачи';
    }

    function taskdashStatusFilterColumn(column) {
        return taskdashIsStatusColumn(column) ? { name: 'СтатусID' } : column;
    }

    function taskdashParseReference(value) {
        var raw = value;
        var text, match;
        if (raw && typeof raw === 'object') {
            raw = raw.id || raw.k || raw.key || raw.value || raw.val || '';
        }
        text = String(raw === null || raw === undefined ? '' : raw).trim();
        match = text.match(/^(\d+)\s*:\s*(.+)$/);
        if (match) return { id: match[1], name: match[2] };
        return { id: '', name: taskdashCellText(value).trim() };
    }

    function taskdashStatusIdsFromFilter(value) {
        var ids = String(value || '').split(',')
            .map(function(item) { return item.trim(); })
            .filter(function(item, index, list) {
                return item && list.indexOf(item) === index;
            });
        return ids;
    }

    function taskdashStatusFilterValue(ids) {
        if (!ids.length) return '';
        return ids.length === 1 ? ids[0] : 'IN(' + ids.join(',') + ')';
    }

    function taskdashStatusIdFromRow(row) {
        var direct = row && (row['СтатусID'] || row['Статус задачиID'] || row['Статус задачи ID']);
        var parsed = taskdashParseReference(direct);
        return parsed.id || taskdashCellText(direct).trim();
    }

    function taskdashIsDateColumn(column) {
        var name = String(column && column.name || '').toLowerCase();
        var format = String(column && column.format || '').toLowerCase();
        return name.indexOf('месяц') !== -1 || name.indexOf('дата') !== -1 || format.indexOf('date') !== -1;
    }

    function taskdashIsMetricColumn(column) {
        var name = String(column && column.name || '').toLowerCase();
        var metrics = ['просрочена', 'отложена', 'завершена', 'в работе', 'сотрудников', 'количество', 'count'];
        if (name.indexOf('статус') !== -1) return false;
        return metrics.some(function(metric) {
            return name === metric || name.indexOf(metric) !== -1;
        });
    }

    function taskdashIsDashboardFilterColumn(column) {
        var name = String(column && column.name || '').trim().toLowerCase();
        return TASKDASH_FILTER_NAMES.indexOf(name) !== -1;
    }

    function taskdashGetFilterColumns(columns) {
        var result = [];
        TASKDASH_FILTER_NAMES.forEach(function(filterName) {
            var column = (columns || []).find(function(item) {
                return String(item && item.name || '').trim().toLowerCase() === filterName;
            });
            if (column && result.indexOf(column) === -1) result.push(column);
        });
        return result;
    }

    function taskdashIsServiceColumn(column) {
        var name = String(column && column.name || '').trim().toLowerCase();
        return name === 'статусid' || name === 'статус задачиid' || name === 'статус задачи id';
    }

    function taskdashGetTableColumns(columns) {
        return (columns || []).filter(function(column) {
            return !taskdashIsServiceColumn(column);
        });
    }

    function taskdashCreateDefaultFilters(year, columns) {
        var filters = {};
        (columns || []).forEach(function(column) {
            if (taskdashIsDashboardFilterColumn(column) && taskdashIsDateColumn(column)) {
                filters[column.id] = {
                    from: String(year) + '-01-01',
                    to: String(year) + '-12-31'
                };
            }
        });
        return filters;
    }

    function taskdashReconcileFilters(oldColumns, newColumns, filters) {
        var byName = {}, next = {};
        (oldColumns || []).forEach(function(column) {
            if (taskdashIsDashboardFilterColumn(column) && filters && filters[column.id]) {
                byName[column.name] = filters[column.id];
            }
        });
        (newColumns || []).forEach(function(column) {
            if (!taskdashIsDashboardFilterColumn(column)) return;
            if (filters && filters[column.id]) {
                next[column.id] = filters[column.id];
            } else if (byName[column.name]) {
                next[column.id] = byName[column.name];
            }
        });
        return next;
    }

    function taskdashBuildReportUrl(dbName, columns, filters) {
        var url = '/' + taskdashEncodeParam(dbName) + '/report/' + TASKDASH_REPORT_ID + '?JSON_KV';
        var params = [];
        (columns || []).forEach(function(column) {
            if (!taskdashIsDashboardFilterColumn(column)) return;
            var filter = filters && filters[column.id] ? filters[column.id] : {};
            var from = filter.from ? String(filter.from).trim() : '';
            var to = filter.to ? String(filter.to).trim() : '';
            var value = filter.value ? String(filter.value).trim() : '';

            if (taskdashIsDateColumn(column)) {
                if (from) params.push(taskdashFilterKey('FR_', column) + '=' + taskdashFormatDateForApi(from));
                if (to) params.push(taskdashFilterKey('TO_', column) + '=' + taskdashFormatDateForApi(to));
            } else if (taskdashIsMetricColumn(column)) {
                if (from) params.push(taskdashFilterKey('FR_', column) + '=' + from);
                if (to) params.push(taskdashFilterKey('TO_', column) + '=' + to);
            } else if (value) {
                if (taskdashIsStatusColumn(column)) {
                    value = taskdashStatusFilterValue(taskdashStatusIdsFromFilter(value));
                    if (value) params.push(taskdashFilterKey('FR_', taskdashStatusFilterColumn(column)) + '=' + value);
                } else {
                    params.push(taskdashFilterKey('FR_', column) + '=%' + value + '%');
                }
            }
        });
        if (params.length) {
            url += '&' + params.map(function(param) {
                var eq = param.indexOf('=');
                return taskdashEncodeParam(param.slice(0, eq)) + '=' + taskdashEncodeParam(param.slice(eq + 1));
            }).join('&');
        }
        return url;
    }

    function taskdashBuildMonthlySeries(rows, columns) {
        var dateColumn = taskdashFindColumn(columns, ['Месяц', 'Дата']);
        var doneColumn = taskdashFindColumn(columns, ['Завершена']);
        var activeColumn = taskdashFindColumn(columns, ['В работе']);
        var overdueColumn = taskdashFindColumn(columns, ['Просрочена']);
        var delayedColumn = taskdashFindColumn(columns, ['Отложена']);
        var grouped = {};

        (rows || []).forEach(function(row) {
            var key = dateColumn ? taskdashMonthKey(row[dateColumn.name]) : '';
            if (!key) return;
            if (!grouped[key]) {
                grouped[key] = { key: key, label: taskdashMonthLabel(key), completed: 0, active: 0, overdue: 0, delayed: 0, total: 0 };
            }
            grouped[key].completed += taskdashValueAsNumber(row, doneColumn);
            grouped[key].active += taskdashValueAsNumber(row, activeColumn);
            grouped[key].overdue += taskdashValueAsNumber(row, overdueColumn);
            grouped[key].delayed += taskdashValueAsNumber(row, delayedColumn);
            grouped[key].total = grouped[key].completed + grouped[key].active + grouped[key].overdue + grouped[key].delayed;
        });

        return Object.keys(grouped).sort().map(function(key) {
            return grouped[key];
        });
    }

    function taskdashValueAsNumber(row, column) {
        if (!row || !column) return 0;
        var value = taskdashParseNumber(row[column.name]);
        return isNaN(value) ? 0 : value;
    }

    function taskdashGetDbName() {
        if (typeof db !== 'undefined' && db) return db;
        if (typeof window.db !== 'undefined' && window.db) return window.db;
        return '';
    }

    function taskdashGetXsrf() {
        if (typeof xsrf !== 'undefined' && xsrf) return xsrf;
        if (typeof window.xsrf !== 'undefined' && window.xsrf) return window.xsrf;
        return '';
    }

    function taskdashSetStatus(message) {
        var status = document.getElementById('taskdash-status');
        if (status) status.textContent = message || '';
    }

    function taskdashSetLoading(isLoading) {
        taskdashState.loading = isLoading;
        var root = document.getElementById('taskdash-root');
        if (root) root.classList.toggle('taskdash-loading', isLoading);
    }

    function taskdashInit() {
        document.title = 'Пульт задач';
        var navCenter = document.querySelector('.navbar-center .navbar-workspace');
        if (navCenter) navCenter.textContent = 'Пульт задач';

        taskdashState.filters = taskdashCreateDefaultFilters(new Date().getFullYear(), taskdashState.columns);
        taskdashRenderFilters();
        taskdashBindEvents();
        taskdashLoadData();
    }

    function taskdashBindEvents() {
        var form = document.getElementById('taskdash-filter-form');
        var clear = document.getElementById('taskdash-clear');

        if (form) {
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                taskdashApplyFiltersFromControls();
            });
        }
        if (clear) clear.addEventListener('click', taskdashClearFilters);
    }

    function taskdashResetFilters() {
        taskdashState.filters = taskdashCreateDefaultFilters(new Date().getFullYear(), taskdashState.columns);
        taskdashRenderFilters();
        taskdashLoadData();
    }

    function taskdashClearFilters() {
        taskdashState.filters = {};
        taskdashRenderFilters();
        taskdashLoadData();
    }

    function taskdashApplyFiltersFromControls() {
        taskdashState.filters = taskdashReadFilters();
        taskdashLoadData();
    }

    function taskdashReadFilters() {
        var filters = {};
        var inputs = document.querySelectorAll('[data-taskdash-filter]');
        inputs.forEach(function(input) {
            var columnId = input.getAttribute('data-taskdash-filter');
            var part = input.getAttribute('data-taskdash-filter-part');
            var value = input.value;
            if (!filters[columnId]) filters[columnId] = {};
            if (value !== '') filters[columnId][part] = value;
        });
        return filters;
    }

    function taskdashRenderFilters() {
        var grid = document.getElementById('taskdash-filter-grid');
        if (!grid) return;
        grid.innerHTML = '';
        taskdashGetFilterColumns(taskdashState.columns).forEach(function(column) {
            grid.appendChild(taskdashCreateFilterControl(column));
        });
    }

    function taskdashCreateFilterControl(column) {
        var wrap = document.createElement('div');
        var label = document.createElement('label');
        var filter = taskdashState.filters[column.id] || {};
        wrap.className = 'taskdash-filter';
        label.textContent = column.name;
        wrap.appendChild(label);

        if (taskdashIsDateColumn(column)) {
            var range = document.createElement('div');
            var from = document.createElement('input');
            var to = document.createElement('input');
            range.className = 'taskdash-range';
            from.type = 'date';
            to.type = 'date';
            from.placeholder = 'от';
            to.placeholder = 'до';
            from.value = filter.from || '';
            to.value = filter.to || '';
            taskdashMarkFilterInput(from, column.id, 'from');
            taskdashMarkFilterInput(to, column.id, 'to');
            range.appendChild(from);
            range.appendChild(to);
            wrap.appendChild(range);
            wrap.appendChild(taskdashCreateQuickLinks(column));
        } else {
            wrap.appendChild(taskdashCreateSelectFilter(column, filter));
        }
        return wrap;
    }

    function taskdashCreateSelectFilter(column, filter) {
        var select = document.createElement('select');
        var empty = document.createElement('option');
        empty.value = '';
        empty.textContent = 'Все';
        select.appendChild(empty);
        taskdashCollectFilterValues(column, filter.value).forEach(function(item) {
            var option = document.createElement('option');
            var value = item && typeof item === 'object' ? item.value : item;
            option.value = value;
            option.textContent = item && typeof item === 'object' ? item.label : value;
            select.appendChild(option);
        });
        select.value = filter.value || '';
        taskdashMarkFilterInput(select, column.id, 'value');
        return select;
    }

    function taskdashCollectFilterValues(column, selectedValue) {
        var values = [];
        var selected = String(selectedValue || '').trim();
        var selectedParts = selected ? selected.split(',').map(function(item) { return item.trim(); }) : [];
        taskdashState.rows.forEach(function(row) {
            var value = row[column.name];
            var item = taskdashIsStatusColumn(column) ? taskdashParseReference(value) : { id: '', name: taskdashCellText(value).trim() };
            if (taskdashIsStatusColumn(column) && !item.id) item.id = taskdashStatusIdFromRow(row);
            var key = taskdashIsStatusColumn(column) ? item.id : item.name;
            if (!key) return;
            if (!values.some(function(existing) { return existing.value === key; })) {
                values.push({ value: key, label: item.name || key });
            }
        });
        values.sort(function(a, b) {
            return a.label.localeCompare(b.label);
        });
        values = values.slice(0, 120);
        selectedParts.forEach(function(part) {
            if (part && !values.some(function(item) { return item.value === part; })) {
                values.unshift({ value: part, label: part });
            }
        });
        return values;
    }

    function taskdashCreateQuickLinks(column) {
        var wrap = document.createElement('div');
        wrap.className = 'taskdash-filter__quick';
        taskdashCreateQuickRanges(new Date()).forEach(function(range) {
            var link = document.createElement('a');
            link.href = '#';
            link.className = 'taskdash-quick-link';
            link.textContent = range.label;
            link.setAttribute('data-taskdash-quick-range', range.key);
            link.addEventListener('click', function(event) {
                event.preventDefault();
                taskdashApplyQuickRange(column.id, range.key);
            });
            wrap.appendChild(link);
        });
        return wrap;
    }

    function taskdashCreateQuickRanges(now) {
        function iso(year, monthIndex, day) {
            return String(year) + '-' + String(monthIndex + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        }
        function lastDay(year, monthIndex) {
            return new Date(year, monthIndex + 1, 0).getDate();
        }

        var date = now instanceof Date ? now : new Date();
        var year = date.getFullYear();
        var month = date.getMonth();
        var previousMonth = new Date(year, month - 1, 1);

        return [
            { key: 'current-year', label: 'текущий год', from: iso(year, 0, 1), to: iso(year, 11, 31) },
            { key: 'previous-year', label: 'прошлый год', from: iso(year - 1, 0, 1), to: iso(year - 1, 11, 31) },
            { key: 'current-month', label: 'текущий месяц', from: iso(year, month, 1), to: iso(year, month, lastDay(year, month)) },
            { key: 'previous-month', label: 'прошлый месяц', from: iso(previousMonth.getFullYear(), previousMonth.getMonth(), 1), to: iso(previousMonth.getFullYear(), previousMonth.getMonth(), lastDay(previousMonth.getFullYear(), previousMonth.getMonth())) }
        ];
    }

    function taskdashApplyQuickRange(columnId, rangeKey) {
        var range = taskdashCreateQuickRanges(new Date()).filter(function(item) {
            return item.key === rangeKey;
        })[0];
        if (!range) return;
        taskdashState.filters = taskdashReadFilters();
        if (!taskdashState.filters[columnId]) taskdashState.filters[columnId] = {};
        taskdashState.filters[columnId].from = range.from;
        taskdashState.filters[columnId].to = range.to;
        taskdashRenderFilters();
        taskdashLoadData();
    }

    function taskdashSafeId(value) {
        return encodeURIComponent(String(value || 'field')).replace(/%/g, '_');
    }

    function taskdashMarkFilterInput(input, columnId, part) {
        input.setAttribute('data-taskdash-filter', columnId);
        input.setAttribute('data-taskdash-filter-part', part);
        input.addEventListener('change', taskdashApplyFiltersFromControls);
    }

    function taskdashCreateDatalist(id, column) {
        var datalist = document.createElement('datalist');
        var values = [];
        datalist.id = id;
        taskdashState.rows.forEach(function(row) {
            var value = taskdashCellText(row[column.name]);
            if (value && values.indexOf(value) === -1) values.push(value);
        });
        values.sort().slice(0, 120).forEach(function(value) {
            var option = document.createElement('option');
            option.value = value;
            datalist.appendChild(option);
        });
        return datalist;
    }

    function taskdashLoadData() {
        var dbName = taskdashGetDbName();
        if (!dbName) {
            taskdashShowError('Не задана база данных.');
            return;
        }

        var url = taskdashBuildReportUrl(dbName, taskdashState.columns, taskdashState.filters);
        var headers = {};
        var token = taskdashGetXsrf();
        if (token) headers['X-XSRF-TOKEN'] = token;

        taskdashSetLoading(true);
        taskdashSetStatus('Загрузка...');
        fetch(url, { headers: headers })
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(function(payload) {
                var normalized = taskdashNormalizeResponse(payload);
                if (normalized.columns.length) {
                    taskdashState.filters = taskdashReconcileFilters(taskdashState.columns, normalized.columns, taskdashState.filters);
                    taskdashState.columns = normalized.columns;
                }
                taskdashState.rows = normalized.rows;
                taskdashSetLoading(false);
                taskdashRenderFilters();
                taskdashRenderDashboard();
                taskdashSetStatus('Обновлено: ' + taskdashFormatClock(new Date()));
            })
            .catch(function(error) {
                taskdashSetLoading(false);
                taskdashShowError('Ошибка загрузки данных: ' + error.message);
            });
    }

    function taskdashShowError(message) {
        taskdashSetStatus(message);
        var chart = document.getElementById('taskdash-chart');
        var table = document.getElementById('taskdash-table-wrap');
        var count = document.getElementById('taskdash-table-count');
        if (chart) chart.innerHTML = '<div class="taskdash-error">' + taskdashEscape(message) + '</div>';
        if (table) table.innerHTML = '<div class="taskdash-error">' + taskdashEscape(message) + '</div>';
        if (count) count.textContent = '';
    }

    function taskdashRenderDashboard() {
        taskdashRenderKpis();
        taskdashRenderChart();
        taskdashRenderTable();
    }

    function taskdashRenderKpis() {
        var wrap = document.getElementById('taskdash-kpis');
        var summary = taskdashBuildSummary(taskdashState.rows, taskdashState.columns);
        if (!wrap) return;
        wrap.innerHTML = '';
        [
            { label: 'Всего задач', value: summary.total, note: summary.completionRate + '% завершено', icon: 'pi pi-list-check', tone: 'total' },
            { label: 'Завершена', value: summary.completed, note: 'готово', icon: 'pi pi-check-circle', tone: 'done' },
            { label: 'В работе', value: summary.active, note: 'активно', icon: 'pi pi-clock', tone: 'active' },
            { label: 'Просрочена', value: summary.overdue, note: 'просрочено', icon: 'pi pi-exclamation-circle', tone: 'overdue' },
            { label: 'Отложена', value: summary.delayed, note: 'ожидает', icon: 'pi pi-pause-circle', tone: 'delayed' }
        ].forEach(function(item) {
            wrap.appendChild(taskdashCreateKpi(item));
        });
    }

    function taskdashBuildSummary(rows, columns) {
        var doneColumn = taskdashFindColumn(columns, ['Завершена']);
        var activeColumn = taskdashFindColumn(columns, ['В работе']);
        var overdueColumn = taskdashFindColumn(columns, ['Просрочена']);
        var delayedColumn = taskdashFindColumn(columns, ['Отложена']);
        var summary = { completed: 0, active: 0, overdue: 0, delayed: 0, total: 0, completionRate: 0 };
        (rows || []).forEach(function(row) {
            summary.completed += taskdashValueAsNumber(row, doneColumn);
            summary.active += taskdashValueAsNumber(row, activeColumn);
            summary.overdue += taskdashValueAsNumber(row, overdueColumn);
            summary.delayed += taskdashValueAsNumber(row, delayedColumn);
        });
        summary.total = summary.completed + summary.active + summary.overdue + summary.delayed;
        summary.completionRate = summary.total ? Math.round(summary.completed / summary.total * 100) : 0;
        return summary;
    }

    function taskdashCreateKpi(item) {
        var el = document.createElement('div');
        var head = document.createElement('div');
        var label = document.createElement('span');
        var icon = document.createElement('span');
        var value = document.createElement('div');
        var note = document.createElement('div');

        el.className = 'taskdash-kpi';
        head.className = 'taskdash-kpi__head';
        label.textContent = item.label;
        icon.className = 'taskdash-kpi__icon taskdash-kpi__icon--' + item.tone;
        icon.innerHTML = '<i class="' + item.icon + '"></i>';
        value.className = 'taskdash-kpi__value';
        value.textContent = taskdashFormatNumber(item.value);
        note.className = 'taskdash-kpi__note';
        note.textContent = item.note;

        head.appendChild(label);
        head.appendChild(icon);
        el.appendChild(head);
        el.appendChild(value);
        el.appendChild(note);
        return el;
    }

    function taskdashRenderChart() {
        var wrap = document.getElementById('taskdash-chart');
        var series = taskdashBuildMonthlySeries(taskdashState.rows, taskdashState.columns);
        var maxTotal = series.reduce(function(max, item) {
            return Math.max(max, item.total);
        }, 0);
        if (!wrap) return;
        wrap.innerHTML = '';
        if (!series.length) {
            wrap.innerHTML = '<div class="taskdash-empty">Нет данных</div>';
            return;
        }

        var bars = document.createElement('div');
        bars.className = 'taskdash-bars';
        series.forEach(function(item) {
            bars.appendChild(taskdashCreateBar(item, maxTotal));
        });
        wrap.appendChild(bars);
    }

    function taskdashCreateBar(item, maxTotal) {
        var wrap = document.createElement('div');
        var total = document.createElement('div');
        var bar = document.createElement('div');
        var label = document.createElement('div');
        wrap.className = 'taskdash-bar-wrap';
        total.className = 'taskdash-bar-total';
        total.textContent = taskdashFormatNumber(item.total);
        bar.className = 'taskdash-bar';
        bar.title = item.label + ': ' + taskdashFormatNumber(item.total);
        taskdashAppendSegment(bar, 'done', item.completed, maxTotal);
        taskdashAppendSegment(bar, 'active', item.active, maxTotal);
        taskdashAppendSegment(bar, 'overdue', item.overdue, maxTotal);
        taskdashAppendSegment(bar, 'delayed', item.delayed, maxTotal);
        label.className = 'taskdash-bar-label';
        label.textContent = item.label;
        wrap.appendChild(total);
        wrap.appendChild(bar);
        wrap.appendChild(label);
        return wrap;
    }

    function taskdashAppendSegment(bar, tone, value, maxTotal) {
        var segment = document.createElement('div');
        var height = maxTotal ? value / maxTotal * 100 : 0;
        segment.className = 'taskdash-bar-segment taskdash-bar-segment--' + tone;
        segment.style.height = value > 0 ? Math.max(height, 1.5) + '%' : '0';
        segment.title = taskdashFormatNumber(value);
        bar.appendChild(segment);
    }

    function taskdashRenderTable() {
        var wrap = document.getElementById('taskdash-table-wrap');
        var count = document.getElementById('taskdash-table-count');
        var rows = taskdashGetSortedRows();
        if (!wrap) return;
        wrap.innerHTML = '';
        if (count) count.textContent = rows.length + ' строк';
        if (!rows.length) {
            wrap.innerHTML = '<div class="taskdash-empty">Нет данных</div>';
            return;
        }

        var table = document.createElement('table');
        var thead = document.createElement('thead');
        var tbody = document.createElement('tbody');
        table.className = 'taskdash-table';
        thead.appendChild(taskdashCreateHeaderRow());
        rows.forEach(function(row) {
            tbody.appendChild(taskdashCreateTableRow(row));
        });
        table.appendChild(thead);
        table.appendChild(tbody);
        wrap.appendChild(table);
    }

    function taskdashCreateHeaderRow() {
        var tr = document.createElement('tr');
        taskdashGetTableColumns(taskdashState.columns).forEach(function(column) {
            var th = document.createElement('th');
            var btn = document.createElement('button');
            var icon = document.createElement('i');
            btn.type = 'button';
            btn.textContent = column.name;
            icon.className = taskdashState.sort.columnId === column.id
                ? (taskdashState.sort.dir === 'asc' ? 'pi pi-sort-up' : 'pi pi-sort-down')
                : 'pi pi-sort-alt';
            btn.appendChild(icon);
            btn.addEventListener('click', function() {
                taskdashApplySort(column.id);
            });
            th.appendChild(btn);
            tr.appendChild(th);
        });
        return tr;
    }

    function taskdashCreateTableRow(row) {
        var tr = document.createElement('tr');
        taskdashGetTableColumns(taskdashState.columns).forEach(function(column) {
            var td = document.createElement('td');
            var raw = row[column.name];
            if (taskdashIsMetricColumn(column)) {
                td.className = 'taskdash-number';
                td.textContent = taskdashFormatMetric(raw);
            } else if (String(column.name || '').toLowerCase().indexOf('статус') !== -1) {
                td.appendChild(taskdashCreateStatusPill(taskdashCellText(raw)));
            } else if (taskdashIsDateColumn(column)) {
                td.textContent = taskdashFormatDateCell(raw);
            } else {
                td.textContent = taskdashCellText(raw);
            }
            tr.appendChild(td);
        });
        return tr;
    }

    function taskdashCreateStatusPill(value) {
        var pill = document.createElement('span');
        var lower = String(value || '').toLowerCase();
        pill.className = 'taskdash-status-pill';
        if (lower.indexOf('заверш') !== -1) pill.classList.add('taskdash-status-pill--done');
        else if (lower.indexOf('работ') !== -1 || lower.indexOf('прин') !== -1) pill.classList.add('taskdash-status-pill--active');
        else if (lower.indexOf('отлож') !== -1) pill.classList.add('taskdash-status-pill--delayed');
        pill.textContent = value || '—';
        return pill;
    }

    function taskdashApplySort(columnId) {
        if (taskdashState.sort.columnId === columnId) {
            taskdashState.sort.dir = taskdashState.sort.dir === 'asc' ? 'desc' : 'asc';
        } else {
            taskdashState.sort.columnId = columnId;
            taskdashState.sort.dir = 'asc';
        }
        taskdashRenderTable();
    }

    function taskdashGetSortedRows() {
        var column = taskdashState.columns.find(function(item) {
            return item.id === taskdashState.sort.columnId;
        }) || taskdashState.columns[0];
        var rows = taskdashState.rows.slice();
        if (!column) return rows;
        rows.sort(function(a, b) {
            var av = taskdashSortValue(a[column.name], column);
            var bv = taskdashSortValue(b[column.name], column);
            var result = av > bv ? 1 : av < bv ? -1 : 0;
            return taskdashState.sort.dir === 'desc' ? -result : result;
        });
        return rows;
    }

    function taskdashSortValue(value, column) {
        var parsedDate = taskdashParseDateValue(value);
        var parsedNumber = taskdashParseNumber(value);
        if (taskdashIsDateColumn(column) && parsedDate) return parsedDate.year + parsedDate.month + parsedDate.day;
        if (!isNaN(parsedNumber) && taskdashIsMetricColumn(column)) return parsedNumber;
        return taskdashCellText(value).toLowerCase();
    }

    function taskdashCellText(value) {
        if (value && typeof value === 'object') {
            if (value.val !== undefined) return String(value.val);
            if (value.value !== undefined) return String(value.value);
        }
        return value === null || value === undefined ? '' : String(value);
    }

    function taskdashFormatMetric(value) {
        var number = taskdashParseNumber(value);
        return isNaN(number) ? taskdashCellText(value) : taskdashFormatNumber(number);
    }

    function taskdashFormatNumber(value) {
        var number = Number(value) || 0;
        return String(Math.round(number * 100) / 100).replace(/\B(?=(\d\d\d)+(?!\d))/g, ' ');
    }

    function taskdashFormatDateCell(value) {
        var key = taskdashMonthKey(value);
        return key ? taskdashMonthLabel(key) : taskdashCellText(value);
    }

    function taskdashFormatClock(date) {
        return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    function taskdashEscape(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', taskdashInit);
    } else {
        taskdashInit();
    }
})();
</script>
