    <!-- Tables Workplace Content -->
    <div class="tables-workplace">
        <div class="tables-header">
            <h1>Таблицы</h1>
            <div class="tables-actions">
                <div class="search-box">
                    <input type="text" id="tables-search" placeholder="Поиск таблиц..." class="search-input">
                    <i class="search-icon pi pi-search"></i>
                </div>
                <button type="button" id="add-table-btn" class="btn-primary btn-small">
                    <span>+</span> Новая таблица
                </button>
            </div>
        </div>

        <div class="tables-container" id="tables-container">
            <!-- Folders with tables will be rendered here by JavaScript -->
            <div class="loading-state" id="tables-loading">
                <div class="loading-spinner"></div>
                <p>Загрузка таблиц...</p>
            </div>
        </div>
    </div>

    <!-- New Table Modal -->
    <div id="new-table-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новая таблица</h2>
                <button type="button" class="modal-close" id="close-new-table-modal"><i class="pi pi-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="new-table-form">
                    <div class="form-group">
                        <label for="new-table-name">Название таблицы</label>
                        <input type="text" id="new-table-name" name="name" required placeholder="Введите название">
                    </div>
                    <div class="form-group">
                        <label for="new-table-type">Тип</label>
                        <div class="custom-select-wrapper">
                            <select id="new-table-type" name="type" required class="custom-select">
                                <option value="3" data-icon="pi pi-file">SHORT</option>
                                <option value="8" data-icon="pi pi-align-left">CHARS</option>
                                <option value="9" data-icon="pi pi-calendar">DATE</option>
                                <option value="13" data-icon="pi pi-hashtag">NUMBER</option>
                                <option value="14" data-icon="pi pi-sort-numeric-down">SIGNED</option>
                                <option value="12" data-icon="pi pi-file-edit">MEMO</option>
                                <option value="4" data-icon="pi pi-clock">DATETIME</option>
                                <option value="2" data-icon="pi pi-code">HTML</option>
                                <option value="5" data-icon="pi pi-lock">GRANT</option>
                                <option value="16" data-icon="pi pi-table">REPORT_COLUMN</option>
                            </select>
                            <i class="custom-select-arrow pi pi-chevron-down"></i>
                        </div>
                    </div>
                    <div class="form-group form-group-checkbox">
                        <label class="checkbox-label">
                            <input type="checkbox" id="new-table-unique" name="unique">
                            <span>Уникальные значения</span>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Создать</button>
                        <button type="button" class="btn-secondary" id="cancel-new-table">Отменить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- New Folder Modal -->
    <div id="new-folder-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новая папка</h2>
                <button type="button" class="modal-close" id="close-new-folder-modal"><i class="pi pi-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="new-folder-form">
                    <div class="form-group">
                        <label for="new-folder-name">Название папки</label>
                        <input type="text" id="new-folder-name" name="name" required placeholder="Введите название">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Создать</button>
                        <button type="button" class="btn-secondary" id="cancel-new-folder">Отменить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Settings object to be populated by templater -->
    <script>
        var myTablesSet = {};
        <!-- Begin: &Settings -->
        myTablesSet['{ID}'] = {'{TYPE}': '{SETTINGS}'.replace(/&quot;/g, '"')};
        <!-- End: &Settings -->
    </script>

    <link rel="stylesheet" href="/css/tables.css">
    <script src="/js/tables.js"></script>

    <!-- Cookie Consent Banner -->
    <div id="cookie-consent" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999; background:#1e293b; color:#f1f5f9; padding:1rem 1.5rem; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; box-shadow:0 -2px 8px rgba(0,0,0,0.2);">
        <span style="font-size:0.9rem;">Мы используем куки для обеспечения работы сайта. Продолжая использовать сайт, вы соглашаетесь с их использованием.</span>
        <button type="button" onclick="cookieAccept()" style="background:#3b82f6; color:#fff; border:none; border-radius:6px; padding:0.5rem 1.25rem; font-size:0.9rem; cursor:pointer; white-space:nowrap;">Принять</button>
    </div>
    <script>
        (function() {
            if (!localStorage.getItem('cookie_consent')) {
                document.getElementById('cookie-consent').style.display = 'flex';
            }
        })();
        function cookieAccept() {
            localStorage.setItem('cookie_consent', '1');
            document.getElementById('cookie-consent').style.display = 'none';
        }
    </script>
