<script>
$(document).ready(function() {
    $('.select2:not([i-orig="1"])').each(function(){
        var curEl=this.id;
        $(this).select2({
            tags: $(this).attr('granted')!==undefined,
            createTag: function (params) {
                let term = $.trim(params.term);
                if (term === '') return null;
                return {
                  id: '-1',
                  text: term,
                  newTag: true
                }
            },
            placeholder: 'Выберите',
            allowClear: true,
            sorter: data => data.sort((a, b) => a.text.localeCompare(b.text)),
            ajax: $(this).attr('i-more') || true ? {
                url: function(params){
                    const restrict=$('select[i-orig='+($(this).attr('i-restrict')||-1)+']').val();
                    return requestURL='/'+db+'/_ref_reqs/'+$(this).attr('id').substr(1)+'?JSON&id='+id+(restrict?'&r='+restrict:'');
                },
                processResults: function(data){
                    let formattedData=[];
                    if(data)
                        for(var i in data)
                            if($('#ms'+curEl).find('span[ref='+i+']').length===0)
                                formattedData.push({"id":i, "text":data[i]})
                    return {results:formattedData};
                },
                dataType: 'json',
                cache: true,
                delay: 330
            } : undefined
        });
    });
    $(".select2").on('select2:select', function (e) {
        if(e.params.data.newTag){
            var vars=new FormData();
            vars.append('t'+$(e.target).attr('i-orig'),e.params.data.text);
            newApi('POST','_m_new/'+$(e.target).attr('i-orig')+'?JSON&up=1','createDicObj',vars,e.target);
        } else if($(this).attr('multi')==='1') {
            setRef(this);
            updateDependentSelects(e, true);
        } else {
            updateDependentSelects(e);
        } 
    });
    $(".select2").on("select2:unselecting",function(e){
        if($(this).attr('multi')==='1') {
            // handled locally in dropMSLocal via badge click; this event fires when select2 clears
            $(e.target).val('');
        } else
            $(e.target).val('');
    });

    // === Any-Record Link editor (i-orig="1") ===
    initAnyRefEditors();

    function initAnyRefEditors() {
        $('select.select2[i-orig="1"]').each(function() {
            var $sel = $(this);
            var fieldId = $sel.attr('id'); // e.g. "t366"
            var fieldName = $sel.attr('name') || fieldId;

            // Get current value from selected option
            var $selected = $sel.find('option:selected');
            var currentId = $selected.val() || '';
            var currentText = $selected.text() || '';
            var currentTableId = $selected.attr('i-orig') || '';

            // Hide original select (keep for form submit)
            $sel.hide();

            // Build the custom editor UI
            var $editor = $('<div class="any-ref-editor-wrap"></div>');
            var $header = $('<div class="any-ref-editor-header d-flex align-items-center" style="border:1px solid #ced4da;border-radius:.25rem;padding:4px 6px;background:#fff;flex-wrap:nowrap;gap:4px;"></div>');
            var $search = $('<input type="text" class="any-ref-search form-control form-control-sm border-0 p-0 flex-grow-1" placeholder="Поиск..." style="min-width:0;box-shadow:none;" autocomplete="off">');
            var $clearBtn = $('<button type="button" class="any-ref-clear btn btn-sm p-0" title="Очистить" style="line-height:1;font-size:16px;background:none;border:none;color:#6c757d;' + (currentId ? '' : 'display:none;') + '">×</button>');
            var $tableBtn = $('<button type="button" class="any-ref-table-btn btn btn-sm p-0" title="Выбрать таблицу" style="line-height:1;font-size:14px;background:none;border:none;color:#6c757d;">⊞</button>');
            $header.append($search, $clearBtn, $tableBtn);

            var $dropdown = $('<div class="any-ref-dropdown list-group" style="display:none;max-height:200px;overflow-y:auto;border:1px solid #ced4da;border-top:none;border-radius:0 0 .25rem .25rem;position:relative;z-index:9999;"></div>');
            $editor.append($header, $dropdown);

            // Insert editor before the hidden select
            $sel.before($editor);

            if (currentId) {
                $search.val(currentText);
            }

            var currentTableRecords = [];
            var activeTableId = currentTableId || '';

            function setCurrentTableId(tableId) {
                activeTableId = tableId;
                $sel.attr('data-any-ref-table', tableId);
            }

            function loadTableRecords(tableId, searchText, callback) {
                var url = '/' + db + '/object/' + tableId + '?JSON_OBJ';
                if (searchText) {
                    url += '&F_' + tableId + '=%25' + encodeURIComponent(searchText) + '%25';
                }
                $.get(url, function(data) {
                    callback(data || []);
                });
            }

            function renderDropdownOptions(records, filterText) {
                $dropdown.empty();
                var list = records;
                if (filterText && records.length < 20) {
                    var q = filterText.toLowerCase();
                    list = records.filter(function(r) {
                        var dispText = (r.r && r.r[0] != null) ? String(r.r[0]) : String(r.i || ''); return dispText.toLowerCase().indexOf(q) !== -1;
                    });
                }
                if (!list.length) {
                    $dropdown.append('<div class="list-group-item list-group-item-action text-muted small">Нет результатов</div>');
                } else {
                    list.forEach(function(r) {
                        var recDisp = (r.r && r.r[0] != null) ? String(r.r[0]) : String(r.i || '');
                        var $opt = $('<a href="#" class="list-group-item list-group-item-action py-1 px-2 small"></a>').text(recDisp);
                        $opt.on('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            var selId = r.i;
                            var selText = (r.r && r.r[0] != null) ? String(r.r[0]) : String(r.i || '');
                            $search.val(selText);
                            $sel.val(selId);
                            // Update hidden select option if needed
                            if (!$sel.find('option[value="' + selId + '"]').length) {
                                $sel.append('<option value="' + selId + '" selected i-orig="' + activeTableId + '">' + selText + '</option>');
                            }
                            $sel.val(selId);
                            $clearBtn.show();
                            $dropdown.hide();
                        });
                        $dropdown.append($opt);
                    });
                }
                $dropdown.show();
            }

            function showTableSelector() {
                $dropdown.empty();
                $.get('/' + db + '/dict?JSON', function(tables) {
                    Object.keys(tables).forEach(function(tableId) {
                        var $opt = $('<a href="#" class="list-group-item list-group-item-action py-1 px-2 small"></a>').text(tables[tableId]);
                        $opt.on('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            setCurrentTableId(tableId);
                            $search.val('');
                            $dropdown.html('<div class="list-group-item text-muted small">Загрузка...</div>');
                            $dropdown.show();
                            loadTableRecords(tableId, '', function(records) {
                                currentTableRecords = records;
                                renderDropdownOptions(records, '');
                                $search.focus();
                            });
                        });
                        $dropdown.append($opt);
                    });
                    $dropdown.show();
                    $search.focus();
                });
            }

            // Load records for current table on init if value is set
            if (activeTableId) {
                setCurrentTableId(activeTableId);
                loadTableRecords(activeTableId, '', function(records) {
                    currentTableRecords = records;
                });
            }

            // Search input handler
            var searchTimer;
            $search.on('input', function() {
                var q = $(this).val();
                if (!activeTableId) {
                    showTableSelector();
                    return;
                }
                clearTimeout(searchTimer);
                searchTimer = setTimeout(function() {
                    if (currentTableRecords.length >= 20) {
                        loadTableRecords(activeTableId, q, function(records) {
                            renderDropdownOptions(records, '');
                        });
                    } else {
                        renderDropdownOptions(currentTableRecords, q);
                    }
                }, 250);
            });

            $search.on('focus', function() {
                if (!activeTableId) return;
                if (currentTableRecords.length) {
                    renderDropdownOptions(currentTableRecords, $search.val());
                }
            });

            $tableBtn.on('click', function(e) {
                e.stopPropagation();
                showTableSelector();
            });

            $clearBtn.on('click', function(e) {
                e.stopPropagation();
                $search.val('');
                $sel.val('');
                $clearBtn.hide();
                $dropdown.hide();
                activeTableId = '';
                currentTableRecords = [];
            });

            // Close dropdown on outside click
            $(document).on('click.anyref-' + fieldId, function(e) {
                if (!$(e.target).closest($editor).length) {
                    $dropdown.hide();
                }
            });
        });
    }
    // === End Any-Record Link editor ===
    $('select[multi="1"]').each(function(){
        // Remove name from multiselect to prevent double submission
        var selId = $(this).attr('id');

function updateDependentSelects(e, multi){
    // получили id изменяемого родителя
    let objectId;
    if (typeof e === 'number' || typeof e === 'string') {
        // при удалении мультиселекта
        objectId = e;
    } else {
        objectId = $(e.target).attr('i-orig');
    }
    // получили objectId выбранного значения в родительской таблице
    let selectedIds;
    if (typeof e === 'number' || typeof e === 'string') {
        // для удаления мультиселекта, получаем оставшиеся id
        selectedIds = $('select[i-orig="' + objectId + '"]').prev().children().toArray().map(v => $(v).attr('ref'));
    } else {
        if (multi) {
            selectedIds = $(e.target).prev().find('span').toArray().map(v => $(v).attr('ref'));
            selectedIds.push(e.params.data.id);
            selectedIds = selectedIds.join(',');
        } else {
            selectedIds = e.params.data.id;
        }
    }
    // получили селекты всех зависимых от него детей
    const dependentSelects = $('.select2.form-control[i-restrict="' + objectId + '"]');
    // для каждого ребенка пробегаемся 
    $(dependentSelects).each((i, val) => {
        // получаем id зависимого ребёнка (для запроса)
        const childId = $(val).attr('id').substr(1);
        // буквально - обратись в дочернюю таблицу childId, запроси по колонке ... те значения, которые равны selectedId
        $.get('/'+db+'/_ref_reqs/'+ childId +'?JSON&id='+id+'&r='+ selectedIds + '&type=query' )
            .done(res => {
                var response = JSON.parse(res);
                var newOptions = Object.keys(response).map(key => ({id: key, text: response[key]}));
                if (newOptions[0]?.id !== $('.select2#t' + childId).select2('data')[0]?.id) {
                    // если выбранной опции нет во вновь приехавших
                    newOptions.unshift($('.select2#t' + childId).select2('data')[0]);
                }
                $('.select2#t' + childId).empty().select2('destroy');//.append('<option>')
                $('.select2#t' + childId).select2({
                    data: newOptions,//JSON.parse(res).object.map(v => ({id: v.id, text: v.val}))
                    placeholder: 'Выберите',
                    allowClear: true,
                    sorter: data => data.sort((a, b) => a.text.localeCompare(b.text)),
                })
            })
            .fail(err => console.log(err));
    });
}

function setDateMode(){
    var el=$(event.target).closest('.comp-control').find('input');
    var date=$(el).val();
    if($(el).hasClass('datepicker')){
        $(el).removeClass('datepicker').attr('type','text').attr('maxlength','10');
        if(date.length)
            $(el).val(date.substr(8,2)+'.'+date.substr(5,2)+'.'+date.substr(0,4)).select();
        $(el).keyup(function(e){
            if(e.keyCode<47||e.keyCode>57)
                e.preventDefault();
            var len = this.value.length;
            if(e.keyCode !== 8){
                if(len>1)
                    if(this.value.substr(1,1)==='.')
                        this.value = '0'+this.value;
                    else if(this.value.substr(2,1)!=='.')
                        this.value = this.value.substr(0,2)+'.'+this.value.substr(2,7);
                if(len>4)
                    if(this.value.substr(4,1)==='.')
                        this.value = this.value.substr(0,3)+'0'+this.value.substr(3);
                    else if(this.value.substr(5,1)!=='.')
                        this.value = this.value.substr(0,5)+'.'+this.value.substr(5,4);
                if(this.value.substr(3,1)==='.')
                    this.value = this.value.substr(0,3)+this.value.substr(4);
                if(this.value.substr(6,1)==='.')
                    this.value = this.value.substr(0,6)+this.value.substr(7);
            }
        });
    }
}
