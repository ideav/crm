<link rel="stylesheet" href="/css/procvac.css?{_global_.version}">
<script src="/js/procvac.js?{_global_.version}" defer></script>

<div id="procvac-app" class="procvac">
    <div class="procvac-toolbar">
        <div class="procvac-search">
            <i class="pi pi-search"></i>
            <input id="procvac-search" type="search" placeholder="Быстрый поиск" autocomplete="off" aria-label="Быстрый поиск">
        </div>
        <button id="procvac-refresh" class="procvac-icon-btn" type="button" title="Обновить" aria-label="Обновить">
            <i class="pi pi-refresh"></i>
        </button>
        <div id="procvac-status" class="procvac-status"></div>
    </div>
    <div id="procvac-grid" class="procvac-grid">
        <div class="procvac-loading"><span class="procvac-spinner"></span>Загрузка...</div>
    </div>
</div>
