# GitHub Repository File Synchronization Configuration
#
# Format:
#   repository: https://github.com/owner/repo/
#   branch: main
#   source_path : target_path
#
# Wildcards: 
#   Use /* at the end of source path to copy all files from a directory
#   Example: css/* : /var/www/site/css/
#
# Notes:
#   - Lines starting with # are comments
#   - Target path is a directory (file keeps original name)
#   - Only files newer than local versions will be copied

[repository crm]
repository: https://github.com/ideav/crm/
branch: main
token: xxx
#ignore_cache: 1

# CSS files (all files from css folder)
css/* : /var/www/www-root/data/www/ideav.ru/css/

# JavaScript files (all files from js folder)
js/* : /var/www/www-root/data/www/ideav.ru/js/

# Template files (individual files)
templates/* : /var/www/www-root/data/www/ideav.ru/templates/

# Custom templates - my folder (all files)
templates/my/* : /var/www/www-root/data/www/ideav.ru/templates/custom/my/
templates/sportzania/* : /var/www/www-root/data/www/ideav.ru/templates/custom/sportzania/
templates/xcom/* : /var/www/www-root/data/www/ideav.ru/templates/custom/xcom/

# Custom templates - ru2 folder (all files)
templates/main.html : /var/www/www-root/data/www/ideav.ru/templates/custom/ru2/
templates/main.html : /var/www/www-root/data/www/ideav.ru/templates/custom/ru/
templates/main.html : /var/www/www-root/data/www/ideav.ru/templates/custom/tgroup/
templates/main.html : /var/www/www-root/data/www/ideav.ru/templates/custom/perelidoz/
templates/info.html : /var/www/www-root/data/www/ideav.ru/templates/custom/ru2/
templates/info.html : /var/www/www-root/data/www/ideav.ru/templates/custom/ru/

download/sportzania/css/* : /var/www/www-root/data/www/ideav.ru/download/sportzania/css/
download/sportzania/js/* : /var/www/www-root/data/www/ideav.ru/download/sportzania/js/

#google_sheets_sync.config.php : /var/www/www-root/data/www/ideav.ru/
include/google_sheets_sync.php : /var/www/www-root/data/www/ideav.ru/include/

export_b3x.php : /var/www/www-root/data/www/ideav.ru/
export_b3x_tasks.php : /var/www/www-root/data/www/ideav.ru/
export_b3x_users.php : /var/www/www-root/data/www/ideav.ru/
export_b3x_departments.php : /var/www/www-root/data/www/ideav.ru/
export_b3x_value_maps.php : /var/www/www-root/data/www/ideav.ru/

start.html : /var/www/www-root/data/www/ideav.ru/

[repository atex]
repository: https://github.com/ideav/atex/
branch: main
token: xxx

templates/atex/* : /var/www/www-root/data/www/ideav.ru/templates/custom/atex/
