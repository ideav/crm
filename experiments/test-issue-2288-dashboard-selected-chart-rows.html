<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Issue 2288 dashboard selected chart rows</title>
    <link rel="stylesheet" href="../assets/vendor/primeicons/primeicons.css">
    <link rel="stylesheet" href="../css/dash.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #eef1f5;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #dash-viz-modal {
            position: static;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="dash-viz-modal" class="open" role="dialog" aria-modal="true">
        <div class="dash-modal-box dash-viz-modal-box">
            <h6>Варианты отображения панели</h6>
            <div id="dash-viz-accordion" class="dash-viz-accordion">
                <div class="dash-viz-accordion-item" data-viz-type="line">
                    <div class="dash-viz-accordion-header">
                        <label class="dash-viz-check-label">
                            <input type="checkbox" class="dash-viz-check" checked>
                            <i class="pi pi-chart-line"></i>
                            <span>Линейный график</span>
                        </label>
                        <label class="dash-viz-default-label" title="По умолчанию">
                            <input type="radio" name="dash-viz-default" class="dash-viz-default" checked>
                            По умолчанию
                        </label>
                    </div>
                    <div class="dash-viz-fieldmap">
                        <div class="dash-viz-field-row dash-viz-field-hint">Поля подбираются автоматически из данных панели.</div>
                        <div class="dash-viz-rows-group">
                            <div class="dash-viz-rows-title">Строки на графике</div>
                            <div class="dash-viz-rows-list">
                                <label class="dash-viz-row-option">
                                    <input type="checkbox" class="dash-viz-row-check" value="101" checked>
                                    <span>Прошли ИС</span>
                                </label>
                                <label class="dash-viz-row-option">
                                    <input type="checkbox" class="dash-viz-row-check" value="102">
                                    <span>Средний TTS (to start), календ ОШ</span>
                                </label>
                                <label class="dash-viz-row-option">
                                    <input type="checkbox" class="dash-viz-row-check" value="103">
                                    <span>Закрыто из взятых в работу</span>
                                </label>
                                <label class="dash-viz-row-option">
                                    <input type="checkbox" class="dash-viz-row-check" value="104" checked>
                                    <span>Вакансии, закрытые рекомендациями</span>
                                </label>
                                <label class="dash-viz-row-option">
                                    <input type="checkbox" class="dash-viz-row-check" value="105">
                                    <span>Закрытые не в срок</span>
                                </label>
                            </div>
                        </div>
                        <div class="dash-viz-size-group">
                            <div class="dash-viz-size-title">Размер</div>
                            <div class="dash-viz-field-row dash-viz-size-row">
                                <label>Ширина</label>
                                <input type="number" min="0" step="0.1" name="sizeWidthValue" value="640">
                                <select name="sizeWidthUnit">
                                    <option value="%">%</option>
                                    <option value="px" selected>px</option>
                                    <option value="rem">rem</option>
                                </select>
                            </div>
                            <div class="dash-viz-field-row dash-viz-size-row">
                                <label>Высота</label>
                                <input type="number" min="0" step="0.1" name="sizeHeightValue" value="360">
                                <select name="sizeHeightUnit">
                                    <option value="%">%</option>
                                    <option value="px" selected>px</option>
                                    <option value="rem">rem</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dash-modal-btns">
                <button class="dash-apply-btn dash-btn-primary">Сохранить</button>
                <button class="dash-apply-btn dash-btn-secondary">Отменить</button>
            </div>
        </div>
    </div>
</body>
</html>
