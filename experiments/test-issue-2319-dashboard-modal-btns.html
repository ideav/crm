<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Issue 2319 dashboard modal buttons</title>
    <link rel="stylesheet" href="../css/dash.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #eef1f5;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #dash-panel-filter-modal {
            position: static;
            min-height: 100vh;
            padding: 1rem;
            background: transparent;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="dash-panel-filter-modal" class="open" role="dialog" aria-modal="true">
        <div class="dash-modal-box dash-panel-filter-modal-box">
            <h6>Фильтр панели</h6>
            <div id="dash-panel-filter-fields" class="dash-panel-filter-fields">
                <div class="dash-panel-filter-field">
                    <div class="dash-panel-filter-label">рекомендациями</div>
                    <div class="dash-panel-filter-range">
                        <input type="date" aria-label="Начало">
                        <span>&mdash;</span>
                        <input type="date" aria-label="Конец">
                    </div>
                </div>
            </div>
            <div class="dash-modal-btns">
                <button class="dash-apply-btn dash-btn-primary">Применить</button>
                <button class="dash-apply-btn dash-btn-secondary">Сбросить</button>
                <button class="dash-apply-btn dash-btn-secondary">Отменить</button>
            </div>
        </div>
    </div>
</body>
</html>
