<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repro #2755 - FIX v5: split wrapper + max-height (sticky preserved)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family:Verdana,Tahoma,sans-serif;
    font-size:13px;
    line-height:normal;
    padding:2px;
    overflow-x:hidden;
    min-height: 100vh;
  }
  table.table-bordered td { border:1px solid #ccc; padding:4px 8px; white-space:nowrap; }
</style>
</head>
<body>
<form>
  <!-- Toolbar TABLE on its own, no longer wrapping the report -->
  <TABLE>
    <TR>
      <TD>Toolbar Left (.HTML/.XLS, Home etc)</TD>
      <TD ALIGN="center"><h4>Wide Report</h4></TD>
      <TD align="right">Toolbar Right (compact, filter, refresh)</TD>
    </TR>
  </TABLE>
  <!-- FIX v5: report wrapped in its own scroll container at FORM/BODY level -->
  <div id="report_scroll" style="overflow:auto; -webkit-overflow-scrolling:touch; max-width:100%;">
    <TABLE id="report_table" class="table-bordered">
      <TR id="hdr" style="background-color:#ffeb3b; position:sticky; top:-1px;"></TR>
    </TABLE>
  </div>
</form>
<script>
  function updateContainerHeight() {
    var wrapper = document.getElementById('report_scroll');
    var rect = wrapper.getBoundingClientRect();
    var available = window.innerHeight - rect.top - 4;
    wrapper.style.maxHeight = Math.max(200, available) + 'px';
  }
  window.addEventListener('resize', updateContainerHeight);

  var t = document.getElementById('report_table');
  var thRow = t.rows[0];
  for (var i = 0; i < 40; i++) {
    var td = document.createElement('td');
    td.innerHTML = '<b>HDR_' + i + '</b>';
    thRow.appendChild(td);
  }
  for (var r = 0; r < 100; r++) {
    var tr = t.insertRow();
    for (var i = 0; i < 40; i++) {
      var td = tr.insertCell();
      td.textContent = 'r' + r + 'c' + i;
    }
  }
  updateContainerHeight();
</script>
</body>
</html>
