<!DOCTYPE html>
<!-- Браузерный стенд рабочего места «Массовый подбор SKU» (xcom).
     Мокает fetch: metadata таблицы RFP, object/{id} (скан строк), report/mass_match, _m_set.
     Использует те же js/css, что и продакшн-шаблон templates/xcom/mass_match.html.
     Проверяет колонку «Наименование из RFP» (#3503), расчёт Точности (#3501) и #3512:
     запись 3 полей одним _m_set (__setRequests = число записей), список ID в колонках,
     авто-цикл пачек (data-batch-size=2 → несколько сканов до пустой пачки). -->
<html lang="ru">
<head>
<meta charset="utf-8">
<title>xcom · Массовый подбор SKU — стенд</title>
<link rel="stylesheet" href="../download/xcom/css/xcom-mass-match.css">
<style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef1f5}</style>
</head>
<body>
<div id="xcom-mass-match-app"
     class="xcom-mass"
     data-db="xcom"
     data-rfp-table="2032189"
     data-query="mass_match"
     data-rfp-filter="RFPID"
     data-batch-size="2"
     data-concurrency="5">
    <section class="xcom-mass-panel">
        <div class="xcom-mass-head">
            <div>
                <h1>Массовый подбор SKU</h1>
                <p id="xcom-mass-batch-hint">Пачка по 50, одновременно до 5 запросов</p>
            </div>
            <div class="xcom-mass-actions">
                <label class="xcom-mass-keyword" title="Ограничить выборку строками RFP, чьё наименование содержит это слово">
                    <i class="pi pi-search"></i>
                    <input id="xcom-mass-keyword" class="xcom-mass-keyword-input" type="search"
                           placeholder="Ключевое слово в наименовании RFP" autocomplete="off">
                </label>
                <span id="xcom-mass-summary" class="xcom-mass-summary">Загрузка…</span>
                <label class="xcom-mass-concurrency" title="Сколько строк обрабатывать одновременно">
                    <span>Потоков</span>
                    <select id="xcom-mass-concurrency" class="xcom-mass-select">
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="7">7</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </label>
                <label class="xcom-mass-auto" title="Авто-регулировка числа потоков по замеру скорости каждой пачки">
                    <input id="xcom-mass-auto" type="checkbox" checked>
                    <span>Авто</span>
                </label>
                <button id="xcom-mass-reload" class="xcom-mass-btn xcom-mass-btn-secondary" type="button"><i class="pi pi-refresh"></i><span>Обновить</span></button>
                <button id="xcom-mass-start" class="xcom-mass-btn xcom-mass-btn-primary" type="button" disabled><i class="pi pi-play"></i><span>Старт</span></button>
                <button id="xcom-mass-stop" class="xcom-mass-btn xcom-mass-btn-danger" type="button" hidden><i class="pi pi-stop"></i><span>Стоп</span></button>
            </div>
        </div>
        <div id="xcom-mass-progress" class="xcom-mass-progress" hidden>
            <div class="xcom-mass-progress-track"><div id="xcom-mass-progress-bar" class="xcom-mass-progress-bar"></div></div>
            <span id="xcom-mass-progress-label" class="xcom-mass-summary">Обработано 0 из 0</span>
        </div>
        <div id="xcom-mass-stats" class="xcom-mass-stats" hidden>
            <div class="xcom-mass-stat"><b id="xcom-mass-stat-time">0:00</b><span>время</span></div>
            <div class="xcom-mass-stat"><b id="xcom-mass-stat-total">0</b><span>обработано</span></div>
            <div class="xcom-mass-stat xcom-mass-stat-ok"><b id="xcom-mass-stat-matched">0</b><span>с подбором</span></div>
            <div class="xcom-mass-stat"><b id="xcom-mass-stat-nomatch">0</b><span>без подбора</span></div>
            <div class="xcom-mass-stat xcom-mass-stat-err"><b id="xcom-mass-stat-errors">0</b><span>ошибки</span></div>
            <div class="xcom-mass-stat"><b id="xcom-mass-stat-speed">0</b><span>строк/мин</span></div>
            <div class="xcom-mass-stat"><b id="xcom-mass-stat-concurrency">5</b><span>потоков</span></div>
        </div>
    </section>
    <section class="xcom-mass-pane">
        <div id="xcom-mass-list" class="xcom-mass-table-wrap"><div class="xcom-mass-loading"><span class="xcom-mass-spinner"></span><span>Загрузка строк RFP…</span></div></div>
    </section>
</div>

<script>
window.xsrf = 'test-token';

// Метаданные таблицы RFP (2032189): главное значение = код, реквизиты по порядку.
var META = {
    id: '2032189', val: 'RFP', type: '3',
    reqs: [
        { num: 1, id: '2032307', val: 'Наименование', type: '8' },
        { num: 2, id: '2033352', val: 'Бренд', type: '3' },
        { num: 3, id: '2123052', val: 'токен', type: '3', attrs: '{"multi":true}' },
        { num: 4, id: '6334033', val: 'Наш артикул', type: '3' },
        { num: 5, id: '6334032', val: 'Кандидаты', type: '8' },
        { num: 6, id: '6333968', val: 'Точность подбора', type: '14' }
    ]
};

// Строки RFP. r = [код, Наименование, Бренд, токен, Наш артикул(r[4]), Кандидаты, Точность].
// Непустой «Наш артикул» (r[4]) = уже сопоставлено. Сервер по фильтру F_6334033=!% такие НЕ
// отдаёт. Первые две строки — обработанные (r[4] заполнен), остальные три — необработанные.
var SCAN = [
    { i: 5780400, u: 1, o: 1, r: ['10466000-1', 'Уже сопоставленная строка №1', 'Canon', '3193348:Canon', '4126386:Картридж Canon', '', '88'] },
    { i: 5780401, u: 1, o: 1, r: ['10466001-1', 'Уже сопоставленная строка №2', 'HP', '3193377:HP', '4140077:Ракель HP', '', '73'] },
    { i: 5780502, u: 1, o: 1, r: ['10466417-1', 'Печь в сборе для печатного устройства konica minolta bizhub PRESS C1085 ГК', 'Konica Minolta', '', '', '', ''] },
    { i: 5780510, u: 1, o: 1, r: ['10466500-2', 'Тонер картридж Canon C-EXV33 черный для imageRUNNER 2520 2525 2530', 'Canon', '', '', '', ''] },
    { i: 5780521, u: 1, o: 1, r: ['10466622-1', 'Ракель wiper blade Hi-Black для HP LaserJet P1005 P1006 P1505', 'Hi-Black', '', '', '', ''] },
    { i: 5780530, u: 1, o: 1, r: ['10466700-9', 'Экзотическая позиция без аналогов в каталоге', '', '', '', '', ''] }
];

// Ответы отчёта mass_match по FR_RFPID. Первая строка = «Наш артикул», остальные — кандидаты.
var REPORT = {
    '5780502': [
        { RFP: '10466417-1', 'Наименование SKU': 'Запчасть Konica Minolta A5AWR70E11 Ролик bizhub Press C1085/AccurioPress C6085', 'токены': '1085,BizHub,C,Konica,Minolta,Press', 'Вес': '9', 'ТММ': '0', 'Артикул': 'A5AWR70E11', SKUID: '4126386' },
        { RFP: '10466417-1', 'Наименование SKU': 'Ролик Konica Minolta bizhub Press C1085', 'токены': '1085,BizHub,Konica,Minolta,Press', 'Вес': '7', 'ТММ': '0', 'Артикул': 'A5AWR70E12', SKUID: '4126390' },
        { RFP: '10466417-1', 'Наименование SKU': 'Ролик подачи Konica Minolta AccurioPress C6085', 'токены': 'AccurioPress,C,Konica,Minolta,Ролик', 'Вес': '6', 'ТММ': '0', 'Артикул': 'A5AWR70E13', SKUID: '4126391' }
    ],
    '5780510': [
        { RFP: '10466500-2', 'Наименование SKU': 'Тонер-картридж Canon C-EXV33 черный imageRUNNER 2520 2525 2530', 'токены': '2520,2525,2530,Canon,EXV33,imageRUNNER,картридж,Тонер,черный', 'Вес': '14', 'ТММ': '1', 'Артикул': 'C-EXV33', SKUID: '4130011' },
        { RFP: '10466500-2', 'Наименование SKU': 'Тонер Canon C-EXV33 для iR 2520', 'токены': '2520,Canon,EXV33,Тонер', 'Вес': '6', 'ТММ': '0', 'Артикул': 'EXV33', SKUID: '4130015' }
    ],
    '5780521': [
        { RFP: '10466622-1', 'Наименование SKU': 'Ракель Hi-Black для HP LaserJet P1005', 'токены': 'Black,Hi,HP,LaserJet,P1005,Ракель', 'Вес': '8', 'ТММ': '0', 'Артикул': 'HB-P1005', SKUID: '4140077' }
    ]
};

window.__scanRequests = 0; // счётчик запросов отбора пачки (демонстрация: один на пачку)

var realFetch = window.fetch;
window.fetch = function(url, opts) {
    var u = String(url);
    var ud = decodeURIComponent(u);
    function json(data) {
        return Promise.resolve(new Response(JSON.stringify(data), { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    if (/\/metadata\//.test(u)) return json(META);
    if (/\/object\/2032189\//.test(u)) {
        window.__scanRequests++;
        var rows = SCAN;
        // серверный фильтр «Наш артикул пуст» (F_6334033=!%) — обработанные строки не отдаём
        if (/F_6334033=!%/.test(ud)) {
            rows = SCAN.filter(function(x) { return (x.r[4] || '') === ''; });
        }
        // #3523: фильтр по «Наименованию» (F_2032307=%слово%) — оставляем строки, чьё r[1] содержит слово
        var mKw = ud.match(/F_2032307=%([^%&]*)%/);
        if (mKw && mKw[1]) {
            var kw = mKw[1].toLowerCase();
            rows = rows.filter(function(x) { return String(x.r[1] || '').toLowerCase().indexOf(kw) !== -1; });
            console.log('[mock] фильтр по наименованию «' + mKw[1] + '» → ' + rows.length + ' строк');
        }
        var mLim = ud.match(/LIMIT=\d+,(\d+)/);
        if (mLim) rows = rows.slice(0, parseInt(mLim[1], 10));
        console.log('[mock] scan #' + window.__scanRequests + ' ' + ud + ' → ' + rows.length + ' строк');
        return json(rows);
    }
    var mRep = ud.match(/FR_RFPID=(\d+)/);
    if (/\/report\/mass_match/.test(u)) return json(REPORT[mRep ? mRep[1] : ''] || []);
    if (/\/_m_set\//.test(u)) {
        // захват записей: t6334033=Наш артикул, t6334032=Кандидаты, t6333968=Точность.
        // #3512: одна команда _m_set на запись содержит все 3 поля — считаем число POST-запросов
        // (__setRequests) отдельно от числа полей (__sets), чтобы доказать «3 поля одним запросом».
        window.__sets = window.__sets || [];
        window.__setRequests = (window.__setRequests || 0) + 1;
        var rid = (ud.match(/_m_set\/(\d+)/) || [])[1];
        var fieldsInThisRequest = 0;
        var body = new URLSearchParams((opts && opts.body) || '');
        body.forEach(function(val, key) {
            if (key.charAt(0) !== 't') return;
            fieldsInThisRequest++;
            window.__sets.push({ record: rid, field: key, value: val });
            // #3512: имитируем серверный side-effect — записанный «Наш артикул» (t6334033)
            // делает строку «обработанной», и следующий скан (F_6334033=!%) её не вернёт →
            // авто-цикл естественно завершается пустой пачкой.
            if (key === 't6334033') {
                SCAN.forEach(function(x) { if (String(x.i) === String(rid)) x.r[4] = val; });
            }
        });
        console.log('[mock] _m_set #' + window.__setRequests + ' запись ' + rid +
            ' — полей в запросе: ' + fieldsInThisRequest);
        return json({ ok: 1 });
    }
    return realFetch(url, opts);
};
</script>
<script src="../download/xcom/js/xcom-mass-match.js"></script>
</body>
</html>
