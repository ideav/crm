<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Issue 2495 unique key UI</title>
    <link rel="stylesheet" href="../assets/vendor/primeicons/primeicons.css">
    <link rel="stylesheet" href="../css/integram-table.css">
    <style>
        body {
            margin: 0;
            min-height: 720px;
            background: #eef2f7;
            color: #212529;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .column-settings-overlay {
            display: none;
        }

        .column-settings-modal {
            position: absolute;
            top: 32px;
            left: 32px;
            transform: none;
            max-width: none;
        }

        .issue-2495-settings-preview {
            width: 520px;
        }

        .issue-2495-edit-preview {
            left: 600px;
            width: 440px;
        }
    </style>
</head>
<body>
    <script src="../js/integram-table.js"></script>
    <script>
        window.grants = { '1': 'WRITE' };

        const table = Object.create(IntegramTable.prototype);
        Object.assign(table, {
            options: { instanceName: 'issue2495Preview', tableTypeId: '100' },
            objectTableId: '100',
            tableGranted: 'WRITE',
            columnOrder: ['100', '200', '300', '400'],
            visibleColumns: ['100', '200', '300', '400'],
            columns: [
                { id: '100', name: 'Заявки', val: 'Заявки', type: '3', orig: '100', attrs: '', unique: '1' },
                { id: '200', name: 'Email', val: 'Email', type: '3', orig: '201', attrs: '{"key":true}', unique: '0' },
                { id: '300', name: 'Телефон', val: 'Телефон', type: '3', orig: '301', attrs: '{"required":true}', unique: '0' },
                { id: '400', name: 'Ответственный', val: 'Пользователь', type: '3', orig: '18', ref: '18', ref_id: '18', attrs: '{"alias":"Ответственный","multi":true,"key":true}', unique: '0' }
            ],
            getApiBase() { return '/crm'; },
            getColTypeIcon(col) {
                const icon = col.ref_id ? 'pi pi-link' : 'pi pi-file';
                return `<span class="col-type-icon"><i class="${icon}" aria-hidden="true"></i></span>`;
            },
            saveColumnState() {},
            render() {},
            closeColumnSettings() {},
            async loadData() {},
            async renameColumn() { return { success: true }; },
            async saveColumnType() { return { success: true }; },
            async setColumnRequired() { return { success: true }; },
            async setColumnAlias() { return { success: true }; },
            async toggleColumnMulti() { return { success: true }; },
            async toggleColumnKey() { return { success: true }; }
        });
        window.issue2495Preview = table;

        table.openColumnSettings();
        document.querySelector('.column-settings-modal').classList.add('issue-2495-settings-preview');

        table.showColumnEditForm(table.columns[1]);
        document.querySelector('.col-edit-modal').classList.add('issue-2495-edit-preview');
    </script>
</body>
</html>
