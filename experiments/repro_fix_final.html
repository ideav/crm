<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repro #2755 - final candidate (mirroring production CSS)</title>
<style>
  /* Mirror of styles.css reset + body */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Verdana, Tahoma, sans-serif;
    font-size: 13px;
    line-height: normal;
    padding: 2px;
    overflow-x: hidden;
    min-height: 100vh;
    background-color: #fff;
    color: #212529;
  }
  /* mimic .table-bordered */
  table.table-bordered { border-collapse: collapse; }
  table.table-bordered td { border: 1px solid #ddd; padding: 4px 8px; white-space: nowrap; }
</style>
</head>
<body>
<form id="report">
  <!-- toolbar -->
  <TABLE>
    <TR>
      <TD>&nbsp;<a href="#"><i style="font-size:1.25rem;">[H]</i></a>&nbsp;
        <a href="#" style="border:1px solid;border-radius:5px;padding:3px;">.HTML</a>
        <a href="#" style="border:1px solid;border-radius:5px;padding:3px;">.XLS</a>
      </TD>
      <TD ALIGN="center" style="padding-left:13px;padding-right:13px"><H4>Wide Report Title</H4></TD>
      <TD align="right" style="padding-right:10px">
        <a href="#" style="font-size:1.25rem;">[c]</a>&nbsp;
        <a href="#" style="font-size:1.25rem;">[f]</a>
        <a href="#" id="refresh" style="font-size:1.25rem;">[r]</a>
        <a href="#" style="font-size:1.25rem;">[x]</a>&nbsp;
      </TD>
    </TR>
  </TABLE>

  <!-- Report scroll container at FORM level so the body's content-area width constrains it.
       overflow:auto + a JS-controlled max-height make this the scroll context for the
       sticky header (same pattern integram-table uses for issue #2083). -->
  <div id="report_scroll" style="overflow:auto; -webkit-overflow-scrolling:touch; max-width:100%;">
    <TABLE id="report_table" class="table-bordered">
      <TR id="hdr" style="background-color:#ffeb3b; position:sticky; top:-1px;"></TR>
    </TABLE>
  </div>
</form>

<script>
  function updateReportScrollHeight() {
    var wrapper = document.getElementById('report_scroll');
    if (!wrapper) return;
    var rect = wrapper.getBoundingClientRect();
    var available = window.innerHeight - rect.top - 4;
    wrapper.style.maxHeight = Math.max(200, available) + 'px';
  }
  window.addEventListener('resize', updateReportScrollHeight);

  var t = document.getElementById('report_table');
  var thRow = t.rows[0];
  for (var i = 0; i < 40; i++) {
    var td = document.createElement('td');
    td.innerHTML = '<b>HDR_' + i + '_long_name</b>';
    thRow.appendChild(td);
  }
  for (var r = 0; r < 100; r++) {
    var tr = t.insertRow();
    for (var i = 0; i < 40; i++) {
      var td = tr.insertCell();
      td.textContent = 'r' + r + 'c' + i;
    }
  }
  updateReportScrollHeight();
</script>
</body>
</html>
