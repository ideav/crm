<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>atex orders harness</title>
<style>
  body { font-family: system-ui, Arial, sans-serif; margin: 0; padding: 16px; background: #eef2f7; }
  /* минимальные стенды для иконок pi, чтобы не тянуть primeicons */

  .pi-check::before { content: "✓"; }
  .pi-chevron-right::before { content: "▸"; }
  .pi-chevron-down::before { content: "▾"; }
  #host { height: 640px; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 8px 24px rgba(15,23,42,.08); }
</style>
</head>
<body>
<div id="host"></div>
<script>
// --- Мок API Интеграма ---

  '107': { id: '107', val: 'Заказ', type: '3', reqs: [
    { id: 1052, val: 'Клиент', type: '3', ref: '103', ref_id: '1053' },
    { id: 1054, val: 'Пользователь', type: '3', ref: '18', ref_id: '1055' },

    { id: 1060, val: 'Статус', type: '3' },
    { id: 1062, val: 'Лидер', type: '3' },
    { id: 1064, val: 'Примечания', type: '12' }
  ]},
  '108': { id: '108', val: 'Позиция заказа', type: '3', reqs: [
    { id: 1067, val: 'Кол-во', type: '13' },

    { id: 1073, val: 'Ширина, мм', type: '13' },
    { id: 1075, val: 'Длина, м', type: '14' },
    { id: 1077, val: 'Диаметр втулки', type: '3', ref: '109', ref_id: '1078' },
    { id: 8463, val: 'Тип намотки', type: '3' },
    { id: 1079, val: 'Статус', type: '3' },
    { id: 8571, val: 'Дата согласования', type: '9' },
    { id: 1159, val: 'Срок изготовления', type: '9' }
  ]}
};
var ORDER_ROWS = [
  { order_id:'651', order_no:'651', order_client:'ООО «Ромашка»', order_manager:'victor_g', order_created:'05.06.2026', order_approved:'', order_due_date:'14.06.2026', order_status:'Новый',
    position_id:'700', position_qty:'120', position_raw:'Бумага мелованная', position_raw_id:'200', position_width:'500', position_length:'1000', position_sleeve:'76', position_sleeve_id:'76', position_winding:'IN', position_status:'Согласована', position_approved:'04.06.2026', position_due_date:'12.06.2026' },
  { order_id:'651', order_no:'651', order_client:'ООО «Ромашка»', order_manager:'victor_g', order_created:'05.06.2026', order_approved:'', order_due_date:'14.06.2026', order_status:'Новый',
    position_id:'701', position_qty:'40', position_raw:'Картон', position_raw_id:'201', position_width:'320', position_length:'500', position_sleeve:'76', position_sleeve_id:'76', position_winding:'OUT', position_status:'Согласована', position_approved:'06.06.2026', position_due_date:'13.06.2026' },
  { order_id:'650', order_no:'650', order_client:'АО «Лютик»', order_manager:'victor_g', order_created:'05.06.2026', order_approved:'', order_due_date:'16.06.2026', order_status:'Новый',

];
var REFS = {
  '1052': { '305': 'ООО «Ромашка»', '306': 'АО «Лютик»', '307': 'ИП Иванов' },
  '1069': { '200': 'Бумага мелованная', '201': 'Картон', '202': 'Плёнка ПВХ' },
  '1077': { '40': '40', '76': '76' },
  '1060': { 'Новый': 'Новый', 'Согласован': 'Согласован' },
  '1079': { 'Новая': 'Новая', 'Согласована': 'Согласована' }
};

window.db = 'atex';
window.xsrf = 'TESTTOKEN';
window.uid = '42';

window.fetch = function(url) {
  var u = String(url);
  function json(data) {
    return Promise.resolve({ ok: true, status: 200, text: function() { return Promise.resolve(JSON.stringify(data)); } });
  }
  var m = u.match(/\/metadata\/(\d+)/);
  if (m) return json(META[m[1]]);
  if (/\/metadata(?:\?|$)/.test(u)) return json([META['107'], META['108']]);
  m = u.match(/\/_ref_reqs\/(\d+)/);
  if (m) return json(REFS[m[1]] || {});
  if (/\/report\/orders_list/.test(u)) return json(ORDER_ROWS);
  return json({});
};

// корень рабочего места
var host = document.getElementById('host');
host.innerHTML = [
  '<div id="atex-orders-app" class="atex-orders" data-db="atex" data-order-table="107" data-position-table="108">',
  '<div class="atex-orders-toolbar">',
  '<button id="atex-orders-create" class="atex-orders-btn atex-orders-btn-primary" type="button"><i class="pi pi-plus"></i><span>Создать заказ</span></button>',

  '<label class="atex-orders-filter-wrap"><span>С:</span><input id="atex-orders-from" type="date" class="atex-orders-input"></label>',
  '<label class="atex-orders-filter-wrap"><span>По:</span><input id="atex-orders-to" type="date" class="atex-orders-input"></label>',
  '<label class="atex-orders-filter-wrap atex-orders-search-wrap"><i class="pi pi-search"></i><input id="atex-orders-search" type="search" class="atex-orders-input" placeholder="Поиск…"></label>',
  '<button id="atex-orders-refresh" class="atex-orders-btn atex-orders-btn-secondary" type="button"><i class="pi pi-refresh"></i><span>Обновить</span></button>',
  '</div>',
  '<div id="atex-orders-message" class="atex-orders-message" hidden></div>',
  '<section id="atex-order-create" class="atex-orders-create" hidden><h2 class="atex-orders-create-title">Новый заказ</h2><form id="atex-order-create-form" class="atex-orders-create-form"></form></section>',
  '<div id="atex-orders-list" class="atex-orders-list"><div class="atex-orders-empty">Загрузка…</div></div>',
  '</div>'
].join('');
</script>
<link rel="stylesheet" href="../download/atex/css/orders.css">
<script src="../download/atex/js/orders.js"></script>
<script>
// раскрыть первый заказ для наглядности после загрузки
setTimeout(function(){
  var t = document.querySelector('[data-toggle="651"]');
  if (t) t.click();
}, 400);
</script>
</body>
