<!DOCTYPE html>
<!-- Браузерный стенд для рабочего места «Пульт слиттера» (#2915).
     Мокает fetch: metadata, object/{id} и команды _m_*.
     Открывать локально, использует те же js/css, что и продакшн-шаблон. -->
<html lang="ru">
<head>
<meta charset="utf-8">
<title>atex · Пульт слиттера — стенд</title>
<link rel="stylesheet" href="../download/atex/css/slitter.css">
<style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef1f5}</style>
</head>
<body>
<div id="atex-slitter" class="atex-sl" data-db="atex" data-xsrf="test-token" data-user="operator" data-user-id="701">
    <div class="atex-sl-loading">Загрузка…</div>
</div>

<script>
// ── Мок схемы atex (имена как в docs/atex_metadata.json; id произвольные) ──
var META = [
    { id: 105, val: 'Вид сырья', reqs: [
        { id: 1040, val: 'Ширина, мм' }
    ]},
    { id: 106, val: 'Партия сырья', reqs: [
        { id: 1044, val: 'Вид сырья' },
        { id: 1046, val: 'Дата прихода' },
        { id: 1048, val: 'Получено, м²' },
        { id: 1050, val: 'Остаток, м²' },
        { id: 1052, val: 'Остаток, м' },
        { id: 1054, val: 'В работе' },
        { id: 1056, val: 'Штрих-код' }
    ]},
    { id: 107, val: 'Слиттер', reqs: [
        { id: 1072, val: 'Статус' }
    ]},
    // #4353: «Дата план» — ГЛАВНОЕ значение записи (r[0], DATETIME unix-сек), отдельного
    // реквизита с таким именем в таблице НЕТ — как в боевой ateh (1078). Мок с «Датой план»
    // отдельной колонкой скрывал баг: colIndex по имени в бою даёт -1.
    { id: 110, val: 'Производственная резка', reqs: [
        { id: 1090, val: 'Слиттер' },
        { id: 1092, val: 'Тип резки' },
        { id: 1094, val: 'Партия сырья' },
        { id: 1098, val: 'Статус' },
        { id: 1100, val: 'Счётчик нач.' },
        { id: 1102, val: 'Счётчик кон.' },
        { id: 1104, val: 'Погонаж факт, м' },
        { id: 1106, val: 'Брак, м²' },
        { id: 1107, val: 'Брак, м' },
        { id: 1108, val: 'Фото брака' },
        { id: 1110, val: 'Очередность' },
        { id: 1111, val: 'Кол-во план' },
        { id: 1113, val: 'Метраж, м' },
        { id: 1115, val: 'Начато' },
        { id: 1116, val: 'Примечания' }
    ]},
    { id: 111, val: 'Расход сырья', reqs: [
        { id: 1112, val: 'Израсходовано, м²' },
        { id: 1114, val: 'Партия сырья' }
    ]},
    // #4359: у события смены есть ссылка «Слиттер» — станок события хранится ссылкой,
    // а не только меткой «{станок} · {дата}» в «Примечаниях» (как в боевой ateh, 1082/642887).
    { id: 114, val: 'Событие смены', reqs: [
        { id: 1138, val: 'Тип события' },
        { id: 1140, val: 'Производственная резка' },
        { id: 1142, val: 'Пользователь' },
        { id: 1144, val: 'Значение' },
        { id: 1146, val: 'Примечания' },
        { id: 1148, val: 'Слиттер' }
    ]}
];

// Хранилище-заглушка. r = [главное значение, ...reqs по порядку метаданных].
var TODAY = new Date().toISOString().slice(0, 10);
// #4353: плановый старт задания — главное значение записи, DATETIME в unix-секундах.
function planAt(hhmm) { return String(Math.floor(new Date(TODAY + 'T' + hhmm + ':00').getTime() / 1000)); }
var DB = {
    materials: [
        { i: 5, r: ['БОПП', '910'] },
        { i: 6, r: ['ПЭТ', '880'] }
    ],
    batches: [
        { i: 601, r: ['Партия А-100 (БОПП)', '5:БОПП', '2026-05-10', '5000', '1200', '900', '1', 'BOPP-A100'] },
        { i: 603, r: ['Партия А-098 (БОПП)', '5:БОПП', '2026-05-02', '4000', '900', '650', '1', 'BOPP-A098'] },
        { i: 602, r: ['Партия Б-205 (ПЭТ)', '6:ПЭТ', '2026-05-18', '8000', '8000', '1200', '1', 'PET-B205'] }
    ],
    slitters: [
        { i: 1, r: ['Слиттер-1', 'В работе'] },
        { i: 2, r: ['Слиттер-2', 'В работе'] }
    ],
    // #4353: очередь Слиттера-1 — завершённое, первое открытое «Ожидает» и ещё одно «Ожидает»
    // за ним (306). У 306 кнопок управления быть не должно, пока 301 не закрыто.
    cuts: [
        { i: 301, r: [planAt('08:00'), '1:Слиттер-1', '11:25×35 БОПП', '601:Партия А-100', 'Ожидает', '', '', '', '', '', '', '1', '4', '400', '', ''] },
        { i: 302, r: [planAt('09:00'), '1:Слиттер-1', '11:25×35 БОПП', '601:Партия А-100', 'В работе', '1000', '1400', '400', '', '', '', '2', '4', '400', TODAY + ' 09:00:00', 'Идёт резка'] },
        { i: 303, r: [planAt('07:00'), '1:Слиттер-1', '11:25×35 БОПП', '601:Партия А-100', 'Завершён', '500', '2200', '1700', '', '', '', '3', '4', '400', TODAY + ' 07:00:00', ''] },
        { i: 304, r: [planAt('08:30'), '2:Слиттер-2', '12:55мм ПЭТ', '602:Партия Б-205', 'Ожидает', '', '', '', '', '', '', '1', '2', '450', '', ''] },
        { i: 306, r: [planAt('10:00'), '1:Слиттер-1', '11:25×35 БОПП', '601:Партия А-100', 'Ожидает', '', '', '', '', '', '', '4', '3', '400', '', ''] }
    ],
    consumptions: {
        301: [ { i: 401, r: ['Расход 1', '300', '601:Партия А-100'] } ],
        302: [],
        303: [],
        306: []
    },
    events: [],
    nextId: 900
};

function field(metaId, row, reqId) {
    var meta = META.filter(function(m){ return String(m.id) === String(metaId); })[0];
    var order = [String(meta.id)].concat(meta.reqs.map(function(r){ return String(r.id); }));
    return order.indexOf(String(reqId));
}

var realFetch = window.fetch;
window.fetch = function(url, opts) {
    var u = String(url);
    function json(data) {
        return Promise.resolve(new Response(JSON.stringify(data), { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    if (/\/metadata(?:$|\?)/.test(u)) return json(META);
    var mObj = u.match(/\/object\/(\d+)\//);
    if (mObj) {
        var tid = mObj[1];
        var fi = u.match(/F_I=(\d+)/);
        var fu = u.match(/F_U=(\d+)/);
        if (tid === '105') return json(DB.materials);
        if (tid === '106') return json(DB.batches);
        if (tid === '107') return json(DB.slitters);
        if (tid === '110') {
            if (fi) return json(DB.cuts.filter(function(c){ return String(c.i) === fi[1]; }));
            return json(DB.cuts);
        }
        if (tid === '111') return json((fu && DB.consumptions[fu[1]]) || []);
        if (tid === '114') return json(DB.events);
    }
    if (/\/_m_new\//.test(u)) {
        var id = DB.nextId++;
        var table = (u.match(/\/_m_new\/(\d+)/) || [])[1];
        var up = (u.match(/[?&]up=([^&]+)/) || [])[1] || '1';
        var body = new URLSearchParams((opts && opts.body) || '');
        var meta = META.filter(function(m){ return String(m.id) === String(table); })[0];
        if (meta && String(table) === '114') {
            var eventRow = [body.get('t' + meta.id) || ''];
            meta.reqs.forEach(function(req){ eventRow.push(body.get('t' + req.id) || ''); });
            DB.events.unshift({ i: id, u: decodeURIComponent(up), r: eventRow });
        }
        console.log('[mock] _m_new', u, opts && opts.body);
        return json({ obj: id, i: id });
    }
    if (/\/_m_set\//.test(u) || /\/_m_save\//.test(u) || /\/_m_del\//.test(u)) {
        console.log('[mock]', u, opts && opts.body);
        return json({ ok: 1 });
    }
    return realFetch(url, opts);
};
</script>
<script src="../download/atex/js/slitter.js"></script>
</body>
</html>
