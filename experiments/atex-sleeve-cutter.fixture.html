<!DOCTYPE html>
<!-- Браузерный стенд для рабочего места «Пульт втулкореза» (#2916).
     Мокает fetch: metadata, object/{id} и команды _m_*.
     Открывать локально, использует те же js/css, что и продакшн-шаблон. -->
<html lang="ru">
<head>
<meta charset="utf-8">
<title>atex · Пульт втулкореза — стенд</title>
<link rel="stylesheet" href="../download/atex/css/sleeve-cutter.css">
<style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef1f5}</style>
</head>
<body>
<div id="atex-sleeve-cutter" class="atex-sc" data-db="atex" data-xsrf="test-token">
    <div class="atex-sc-loading">Загрузка…</div>
</div>

<script>
// ── Мок схемы atex (имена как в docs/atex_metadata.json; id произвольные) ──
// Таблица «Задание на втулки» (1080) задаётся через alias, а её главное
// значение (первая колонка) — плановое количество втулок «К-во план» (#3159).
var META = [
    { id: 1071, val: 'Втулкорез', reqs: [
        { id: 1095, val: 'Статус' },
        { id: 8286, val: 'Диаметр min, мм' },
        { id: 8287, val: 'Диаметр max, мм' }
    ]},
    { id: 1076, val: 'Позиция заказа', reqs: [
        { id: 1137, val: 'Кол-во' },
        { id: 1141, val: 'Ширина, мм' },
        { id: 8194, val: 'Диаметр втулки' },
        { id: 13671, val: 'К-во план', alias: 'Задание на втулки', arr_id: '1080' }
    ]},
    { id: 1080, val: 'К-во план', alias: 'Задание на втулки', attrs: '{"alias":"Задание на втулки"}', reqs: [
        { id: 1180, val: 'Втулкорез' },
        { id: 1181, val: 'Диаметр, мм' },
        { id: 1183, val: 'Кол-во факт' },
        { id: 1184, val: 'Статус' }
    ]}
];

// Хранилище-заглушка. r = [главное значение (план), ...reqs по порядку метаданных].
var DB = {
    cutters: [
        { i: 201, r: ['ВР-20/25', 'Доступен', '20', '25'] },
        { i: 202, r: ['ВР-26/40', 'Доступен', '26', '40'] },
        { i: 203, r: ['ВР-41/76', 'Доступен', '41', '76'] }
    ],
    positions: [
        { order_no: 'АТХ-3139', position_id: '301', position_no: '1', position_qty: '100',
          position_width: '57.00', position_length: '1200', position_sleeve: '8188:76', position_status: 'В работе' },
        { order_no: 'АТХ-3139', position_id: '302', position_no: '2', position_qty: '60',
          position_width: '40.00', position_length: '1200', position_sleeve: '8189:40', position_status: 'Новая' }
    ],
    tasks: {
        301: [
            { i: 401, r: ['100', '203:ВР-41/76', '76', '100', 'Готово'] },
            { i: 402, r: ['100', '203:ВР-41/76', '76', '45', 'В работе'] }
        ],
        302: []
    },
    nextId: 500
};

var realFetch = window.fetch;
window.fetch = function(url, opts) {
    var u = String(url);
    function json(data) {
        return Promise.resolve(new Response(JSON.stringify(data), { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    if (/\/metadata(?:$|\?)/.test(u)) return json(META);
    if (/\/report\/orders_list/.test(u)) return json(DB.positions);
    if (/\/report\/positions_list/.test(u)) return json(DB.positions);
    var mObj = u.match(/\/object\/(\d+)\//);
    if (mObj) {
        var tid = mObj[1];
        if (tid === '1071') return json(DB.cutters);
        if (tid === '1080') {
            var fu = u.match(/F_U=(\d+)/);
            var key = fu ? fu[1] : null;
            return json((key && DB.tasks[key]) || []);
        }
    }
    if (/\/_m_new\//.test(u)) {
        var id = DB.nextId++;
        console.log('[mock] _m_new', u, opts && opts.body);
        return json({ obj: id, i: id });
    }
    if (/\/_m_set\//.test(u) || /\/_m_save\//.test(u) || /\/_m_del\//.test(u)) {
        console.log('[mock]', u, opts && opts.body);
        return json({ ok: 1 });
    }
    return realFetch(url, opts);
};
</script>
<script src="../download/atex/js/sleeve-cutter.js"></script>
</body>
</html>
