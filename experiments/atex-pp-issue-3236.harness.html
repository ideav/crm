<!DOCTYPE html>
<!-- Стенд проверки #3236: старт в .atex-pp-cut-num, намотка без метража,
     видимая очередь внутри дня сортирует ножи по убыванию. -->
<html lang="ru">
<head>
<meta charset="utf-8">
<title>atex · #3236 — планирование производства</title>
<link rel="stylesheet" href="../download/atex/css/atex-brand.css">
<link rel="stylesheet" href="../download/atex/css/production-planning.css">
<style>
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef1f5;padding:16px}
#banner{padding:10px 14px;border-radius:8px;font-weight:700;margin-bottom:12px}
.ok{background:#dcfce7;color:#166534;border:1px solid #16a34a}
.fail{background:#fee2e2;color:#991b1b;border:1px solid #dc2626}
</style>
</head>
<body>
<div id="banner">Выполняется...</div>
<div id="atex-production-planning" class="atex-pp atex-brand" data-db="atex" data-xsrf="test" data-initialized="1"></div>

<script src="../download/atex/js/production-planning.js"></script>
<script>
(function () {
  var api = window.AtexProductionPlanning;
  var root = document.getElementById('atex-production-planning');
  var ctrl = new api.Controller(root);

  root.innerHTML = '';
  var layout = document.createElement('div'); layout.className = 'atex-pp-layout';
  var qWrap = document.createElement('section'); qWrap.className = 'atex-pp-panel atex-pp-queue-panel';
  ctrl.queueEl = document.createElement('div'); ctrl.queueEl.className = 'atex-pp-queue';
  qWrap.appendChild(ctrl.queueEl);
  layout.appendChild(qWrap);
  root.appendChild(layout);

  ctrl.filter = { slitter: '', status: '', date: '' };
  ctrl.positions = [];
  ctrl.supplies = [];
  ctrl.footageBySupply = {};
  ctrl.genBatches = [{ id: 'b1', materialId: 'M', dateKey: 20260601, remainder: 10000, active: true }];
  ctrl.consumptionByCut = { high: [{ m2: 1200 }], mid: [{ m2: 1200 }], low: [{ m2: 1200 }] };
  ctrl.jumboWidthByMaterial = { M: 910 };
  ctrl.daySettings = {};
  ctrl.opTimes = { WIND_1200: 8, BETWEEN_CUTS: 2, MATERIAL_WINDING: 15, KNIFE: 30, CLEANUP_SHIFT: 30 };
  ctrl.changeTimes = ctrl.opTimes;
  ctrl.cuts = [
    {
      id: 'low', number: '1780837651', sequence: 1, knifeCount: 3, knifeWidths: [110, 70, 50],
      slitter: { id: '201', label: 'Слиттер 1' }, materialBatch: { label: 'Партия M' },
      planDate: '2026-06-08', status: 'В очереди', materialId: 'M', materialName: 'MR194',
      winding: 'OUT', length: 1200, plannedRuns: 1, rollerWidth: 60
    },
    {
      id: 'high', number: '1780837652', sequence: 2, knifeCount: 7, knifeWidths: [90, 90, 90, 70, 70, 50, 50],
      slitter: { id: '201', label: 'Слиттер 1' }, materialBatch: { label: 'Партия M' },
      planDate: '2026-06-08', status: 'В очереди', materialId: 'M', materialName: 'MR194',
      winding: 'OUT', length: 1200, plannedRuns: 1, rollerWidth: 60
    },
    {
      id: 'mid', number: '1780837653', sequence: 3, knifeCount: 5, knifeWidths: [90, 90, 70, 50, 50],
      slitter: { id: '201', label: 'Слиттер 1' }, materialBatch: { label: 'Партия M' },
      planDate: '2026-06-08', status: 'В очереди', materialId: 'M', materialName: 'MR194',
      winding: 'OUT', length: 1200, plannedRuns: 1, rollerWidth: 60
    }
  ];

  ctrl.renderQueue();

  var results = [];
  function check(name, cond) { results.push({ name: name, ok: !!cond }); }
  var cards = Array.prototype.slice.call(ctrl.queueEl.querySelectorAll('.atex-pp-cut'));
  var ids = cards.map(function (card) { return card.getAttribute('data-cut-id'); });
  var starts = cards.map(function (card) { return (card.querySelector('.atex-pp-cut-num') || {}).textContent || ''; });
  var windings = cards.map(function (card) { return (card.querySelector('.atex-pp-cut-winding') || {}).textContent || ''; });
  var runs = cards.map(function (card) { return (card.querySelector('.atex-pp-cut-runs') || {}).textContent || ''; });

  check('ножи идут по убыванию 7,5,3 при старом sequence 1,2,3', ids.join(',') === 'high,mid,low');
  check('.atex-pp-cut-num показывает только ЧЧ:ММ', starts.length === 3 && starts.every(function (s) { return /^\d{2}:\d{2}$/.test(s); }));
  check('.atex-pp-cut-winding не содержит метраж', windings.every(function (s) { return s === 'Намотка: OUT'; }));
  check('метраж остаётся в строке проходов, не в намотке', runs.every(function (s) { return /1200м/.test(s); }));

  var allOk = results.every(function (r) { return r.ok; });
  window.__TEST_RESULT = { ok: allOk, results: results, order: ids, starts: starts, windings: windings, runs: runs };
  var banner = document.getElementById('banner');
  banner.className = allOk ? 'ok' : 'fail';
  banner.textContent = (allOk ? 'ВСЕ ПРОВЕРКИ ПРОЙДЕНЫ' : 'ЕСТЬ ПАДЕНИЯ') + ' - ' +
    results.map(function (r) { return (r.ok ? 'OK ' : 'FAIL ') + r.name; }).join(' | ');
})();
</script>
</body>
</html>
