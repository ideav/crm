<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Issue 2356 dashboard panel icon order</title>
    <link rel="stylesheet" href="../assets/vendor/primeicons/primeicons.css">
    <link rel="stylesheet" href="../css/dash.css">
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f6f7f9;
            color: #212529;
            font: 14px/1.4 Arial, sans-serif;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
            max-width: 980px;
        }
        .demo-panel {
            background: #fff;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            padding: 16px;
        }
        .demo-panel h3 {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .demo-state {
            margin: 12px 0 6px;
            color: #6c757d;
            font-size: 12px;
            text-transform: uppercase;
        }
        .demo-panel .f-panel {
            border: 1px dashed #b7c1cc;
            border-radius: 6px;
            padding: 12px;
        }
        .demo-panel .f-panel-header {
            margin-bottom: 0;
        }
        .demo-panel .f-panel-header h4 {
            font-size: 18px;
            line-height: 1.25;
            white-space: nowrap;
        }
        .demo-panel .f-panel-settings-icon,
        .demo-panel .f-panel-filter-icon.active,
        .demo-panel .demo-hover .f-panel-filter-icon {
            display: inline-flex;
            align-items: center;
        }
        .demo-panel .demo-active-only .f-panel-settings-icon {
            display: none;
        }
        .demo-after .demo-hover .f-panel-filter-icon {
            outline: 2px solid #1f883d;
            outline-offset: 2px;
        }
        .demo-before .demo-hover .f-panel-filter-icon {
            outline: 2px solid #d1242f;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="demo-grid">
        <section class="demo-panel demo-before">
            <h3>Before: filter before settings</h3>
            <div class="demo-state">Active filter</div>
            <div class="f-panel demo-active-only">
                <div class="f-panel-header">
                    <div class="f-panel-viz-icons"></div>
                    <h4>Dashboard panel</h4>
                    <a class="f-panel-filter-icon active" title="Фильтр"><i class="pi pi-filter"></i></a>
                    <a class="f-panel-settings-icon" title="Настройки отображения"><i class="pi pi-chart-bar"></i></a>
                </div>
            </div>
            <div class="demo-state">Active filter + panel hover</div>
            <div class="f-panel demo-hover">
                <div class="f-panel-header">
                    <div class="f-panel-viz-icons"></div>
                    <h4>Dashboard panel</h4>
                    <a class="f-panel-filter-icon active" title="Фильтр"><i class="pi pi-filter"></i></a>
                    <a class="f-panel-settings-icon" title="Настройки отображения"><i class="pi pi-chart-bar"></i></a>
                </div>
            </div>
        </section>

        <section class="demo-panel demo-after">
            <h3>After: settings before filter</h3>
            <div class="demo-state">Active filter</div>
            <div class="f-panel demo-active-only">
                <div class="f-panel-header">
                    <div class="f-panel-viz-icons"></div>
                    <h4>Dashboard panel</h4>
                    <a class="f-panel-settings-icon" title="Настройки отображения"><i class="pi pi-chart-bar"></i></a>
                    <a class="f-panel-filter-icon active" title="Фильтр"><i class="pi pi-filter"></i></a>
                </div>
            </div>
            <div class="demo-state">Active filter + panel hover</div>
            <div class="f-panel demo-hover">
                <div class="f-panel-header">
                    <div class="f-panel-viz-icons"></div>
                    <h4>Dashboard panel</h4>
                    <a class="f-panel-settings-icon" title="Настройки отображения"><i class="pi pi-chart-bar"></i></a>
                    <a class="f-panel-filter-icon active" title="Фильтр"><i class="pi pi-filter"></i></a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
