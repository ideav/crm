<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Issue 1548 Dict Theme Check</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --border-color: #dee2e6;
      --dict-brand-primary: #1283da;
      --dict-brand-light: #419ce1;
      --dict-brand-soft: #ccdfff;
      --dict-brand-soft-strong: #a2ceef;
      --dict-brand-text: #4675ac;
      --dict-brand-hover-text: #ffffff;
      --dict-gradient-hover: linear-gradient(92.58deg, var(--dict-brand-light) 4.59%, var(--dict-brand-primary) 90.68%);
      --dict-gradient-active: linear-gradient(to right, #0e69ae, #0e69ae);
      --dict-shadow-hover: rgba(0, 97, 254, 0.21);
      --dict-highlight-bg: #ebf7ff;
      --dict-muted: #cccccc;
      --dict-sortable-border: #e4e4e6;
      --dict-sortable-bg: #ffffff;
      --dict-category-new: #6c757d;
      --dict-search-icon: var(--dict-brand-soft);
      --dict-icon-stroke: #1a1a1a;
      --dict-icon-fill: var(--dict-brand-soft-strong);
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #e9ecef;
      --border-color: #495057;
      --dict-brand-primary: #66b8f0;
      --dict-brand-light: #8acbf7;
      --dict-brand-soft: #2d4a70;
      --dict-brand-soft-strong: #4d79a8;
      --dict-brand-text: #8ebef0;
      --dict-brand-hover-text: #f8fbff;
      --dict-gradient-hover: linear-gradient(92.58deg, #2c6ea8 4.59%, #1a5490 90.68%);
      --dict-gradient-active: linear-gradient(to right, #154a76, #154a76);
      --dict-shadow-hover: rgba(0, 0, 0, 0.35);
      --dict-highlight-bg: #1e3146;
      --dict-muted: #6c7a89;
      --dict-sortable-border: var(--border-color);
      --dict-sortable-bg: var(--bg-secondary);
      --dict-category-new: #adb5bd;
      --dict-search-icon: #6f9fcc;
      --dict-icon-stroke: #d0d7de;
      --dict-icon-fill: #6f9fcc;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .page {
      padding: 24px;
      display: grid;
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 8px 14px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
    }
    .dict-title { font-size: 45px; color: var(--dict-brand-primary); font-weight: 100; }
    .dict-title-box { display: flex; align-items: baseline; flex-wrap: wrap; gap: 12px; }
    .dict-new {
      color: var(--dict-brand-primary);
      width: 40px; height: 40px; border: 1px solid var(--dict-brand-soft-strong);
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
    }
    .dict-new:hover { background: var(--dict-gradient-hover); color: var(--dict-brand-hover-text); }
    .dict-new svg { fill: currentColor; color: var(--dict-icon-fill); }
    .dict-list { display: flex; flex-wrap: wrap; gap: 12px; }
    .dict-item {
      color: var(--dict-brand-text);
      border: 1px solid var(--dict-brand-soft);
      border-radius: 5px;
      padding: 10px 14px;
      background: var(--bg-primary);
    }
    .dict-item:hover { background: var(--dict-gradient-hover); color: var(--dict-brand-hover-text); box-shadow: 0 5px 7px var(--dict-shadow-hover); }
    .dict-category { color: var(--dict-brand-primary); font-size: 1.2rem; font-weight: lighter; display: flex; align-items: center; gap: 8px; }
    .inactive { color: var(--dict-muted) !important; }
    .highlight { background: var(--dict-highlight-bg); padding: 12px; border-radius: 6px; }
    .dict-category-sortable { border: 1px solid var(--dict-sortable-border); background: var(--dict-sortable-bg); box-shadow: 0 5px 7px var(--dict-shadow-hover); padding: 12px; border-radius: 6px; }
    .dictionary__search { color: var(--dict-search-icon); width: 300px; position: relative; }
    .dictionary__search input {
      width: 100%;
      background: transparent;
      color: var(--text-primary);
      border: 0;
      border-bottom: 1px solid var(--dict-brand-soft);
      padding: 8px 0 8px 25px;
      line-height: 34px;
    }
    .dictionary__search::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 17px;
      height: 17px;
      transform: translateY(-50%);
      background-color: currentColor;
      -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='17' height='17' viewBox='0 0 17 17' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7.06814 0.125C3.23355 0.125 0.125 3.23355 0.125 7.06814C0.125 10.9027 3.23355 14.0113 7.06814 14.0113C8.66262 14.0113 10.1317 13.4741 11.3032 12.5717L16.0214 16.7286C16.2167 16.9238 16.5333 16.9238 16.7285 16.7286C16.9238 16.5333 16.9238 16.2167 16.7285 16.0215L12.2287 11.5216C13.1311 10.3502 13.6683 8.8811 13.6683 7.28662C13.6683 3.45203 10.5597 0.343479 6.72512 0.343479H7.06814V0.125ZM7.06814 1.125C10.3504 1.125 13.0113 3.78584 13.0113 7.06814C13.0113 10.3505 10.3504 13.0113 7.06814 13.0113C3.78584 13.0113 1.125 10.3505 1.125 7.06814C1.125 3.78584 3.78584 1.125 7.06814 1.125Z' fill='black'/%3E%3C/svg%3E");
      mask-image: url("data:image/svg+xml,%3Csvg width='17' height='17' viewBox='0 0 17 17' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7.06814 0.125C3.23355 0.125 0.125 3.23355 0.125 7.06814C0.125 10.9027 3.23355 14.0113 7.06814 14.0113C8.66262 14.0113 10.1317 13.4741 11.3032 12.5717L16.0214 16.7286C16.2167 16.9238 16.5333 16.9238 16.7285 16.7286C16.9238 16.5333 16.9238 16.2167 16.7285 16.0215L12.2287 11.5216C13.1311 10.3502 13.6683 8.8811 13.6683 7.28662C13.6683 3.45203 10.5597 0.343479 6.72512 0.343479H7.06814V0.125ZM7.06814 1.125C10.3504 1.125 13.0113 3.78584 13.0113 7.06814C13.0113 10.3505 10.3504 13.0113 7.06814 13.0113C3.78584 13.0113 1.125 10.3505 1.125 7.06814C1.125 3.78584 3.78584 1.125 7.06814 1.125Z' fill='black'/%3E%3C/svg%3E");
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: 17px 17px;
      mask-size: 17px 17px;
      pointer-events: none;
    }
    .icons { display: flex; gap: 12px; color: var(--dict-icon-stroke); }
    .icons svg [stroke] { stroke: currentColor; }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <button type="button" id="toggleTheme">Toggle Theme</button>
      <span id="themeValue">light</span>
    </div>
    <div class="dict-title-box">
      <div class="dict-title">Таблицы</div>
      <div class="dict-new" aria-hidden="true">
        <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd">
          <path d="M11 11v-11h1v11h11v1h-11v11h-1v-11h-11v-1h11z"/>
        </svg>
      </div>
      <div class="dictionary__search"><input type="text" placeholder="Поиск"></div>
    </div>
    <div class="dict-category-sortable">
      <div class="dict-category">
        <span>Справочники</span>
        <svg class="chevron" width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M8 11L14 17L20 11" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="dict-list">
        <div class="dict-item">Контакты</div>
        <div class="dict-item">Сделки</div>
        <div class="dict-item">Справочники</div>
      </div>
    </div>
    <div class="highlight">Highlight / drop target state</div>
    <div class="dict-category inactive">Inactive category</div>
    <div class="icons">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M14 1L19 6L6 19H1V14L14 1Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 8L1 11M1 11L4 14M1 11H21M8 4L11 1M11 1L14 4M11 1V21M14 18L11 21M11 21L8 18M18 8L21 11M21 11L18 14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <script>
    const root = document.documentElement;
    const themeValue = document.getElementById('themeValue');
    document.getElementById('toggleTheme').addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      themeValue.textContent = next;
    });
  </script>
</body>
</html>
