<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Issue 2568 — token masking & change highlight</title>
<style>
:root {
    --text-primary: #222;
    --text-secondary: #666;
    --bg-primary: #fff;
    --bg-secondary: #f5f5f7;
    --border-color: #d0d7de;
    --color-primary: #1283da;
    --color-success: #28a745;
    --color-danger: #dc3545;
    --color-warning-bg: #fff8e1;
    --color-warning-border: #f5c518;
    --color-warning-text: #8a6d00;
}
body { font-family: sans-serif; padding: 1.5rem; background: var(--bg-primary); color: var(--text-primary); }
.gss-field { margin-bottom: 0.75rem; }
.gss-field label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.2rem; }
.gss-field input[type=text], .gss-field input[type=password] { width: 100%; box-sizing: border-box; padding: 0.45rem 0.6rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-secondary); color: var(--text-primary); font-size: 0.9rem; font-family: inherit; }
.gss-secret { position: relative; }
.gss-secret input { padding-right: 2.2rem !important; }
.gss-secret-toggle { position: absolute; right: 0.4rem; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0.2rem 0.35rem; cursor: pointer; color: var(--text-secondary); font-size: 0.95rem; border-radius: 3px; }
.gss-secret-toggle:hover { color: var(--text-primary); background: var(--bg-secondary); }
.gss-field input.gss-changed { border-color: var(--color-warning-border, #f5c518); background: var(--color-warning-bg, #fff8e1); color: var(--color-warning-text, #8a6d00); }
.gss-row { display: flex; gap: 1rem; }
.gss-row .gss-field { flex: 1; }
button.act { margin-top: 1rem; padding: 0.4rem 1rem; }
</style>
</head>
<body>
<h3>Issue 2568 — token masking & change highlight</h3>
<p>Initial token value: <code>secret-12345</code>. Initial xsrf: <em>(empty)</em></p>

<div class="gss-row">
    <div class="gss-field">
        <label>Токен авторизации</label>
        <div class="gss-secret">
            <input type="password" id="gss-token" autocomplete="new-password">
            <button type="button" class="gss-secret-toggle" data-target="gss-token" title="Показать/скрыть">👁</button>
        </div>
    </div>
    <div class="gss-field">
        <label>Токен xsrf</label>
        <div class="gss-secret">
            <input type="password" id="gss-xsrf" autocomplete="new-password">
            <button type="button" class="gss-secret-toggle" data-target="gss-xsrf" title="Показать/скрыть">👁</button>
        </div>
    </div>
</div>

<button class="act" id="load">Load saved values</button>
<button class="act" id="clear">Clear</button>

<script>
function resetSecretInitials() {
    document.querySelectorAll('.gss-secret input').forEach(function(inp) {
        inp.dataset.initial = inp.value;
        inp.classList.remove('gss-changed');
        inp.type = 'password';
    });
}
document.querySelectorAll('.gss-secret input').forEach(function(inp) {
    inp.addEventListener('input', function() {
        inp.classList.toggle('gss-changed', inp.value !== (inp.dataset.initial || ''));
    });
});
document.querySelectorAll('.gss-secret-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var inp = document.getElementById(btn.dataset.target);
        if (!inp) return;
        inp.type = inp.type === 'password' ? 'text' : 'password';
    });
});
document.getElementById('load').addEventListener('click', function() {
    document.getElementById('gss-token').value = 'secret-12345';
    document.getElementById('gss-xsrf').value = '';
    resetSecretInitials();
});
document.getElementById('clear').addEventListener('click', function() {
    document.getElementById('gss-token').value = '';
    document.getElementById('gss-xsrf').value = '';
    resetSecretInitials();
});
resetSecretInitials();
</script>
</body>
</html>
