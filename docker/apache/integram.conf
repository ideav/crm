ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex start.html index.php
        FallbackResource /index.php
    </Directory>

    # Безопасность: папки, в которые dir_admin загружает файлы (download, templates/custom),
    # не должны выполнять скрипты и не должны переопределяться через .htaccess —
    # иначе загруженный файл может стать исполняемым кодом (RCE). Статика (js/css/html) отдаётся.
    <Directory /var/www/html/download>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>
    <Directory /var/www/html/templates/custom>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/integram/certs/local.crt
    SSLCertificateKeyFile /etc/integram/certs/local.key

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex start.html index.php
        FallbackResource /index.php
    </Directory>

    # Безопасность: папки, в которые dir_admin загружает файлы (download, templates/custom),
    # не должны выполнять скрипты и не должны переопределяться через .htaccess —
    # иначе загруженный файл может стать исполняемым кодом (RCE). Статика (js/css/html) отдаётся.
    <Directory /var/www/html/download>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>
    <Directory /var/www/html/templates/custom>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/ssl-access.log combined
</VirtualHost>
</IfModule>
