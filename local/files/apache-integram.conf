# Виртуальный хост Apache для Интеграм (ручная установка, путь 2).
# Поправьте DocumentRoot и ServerName под свой сервер. Пути к каталогам загрузок
# (download, templates/custom) должны совпадать с DocumentRoot.

ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/integram

    <Directory /var/www/integram>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        # Маршрутизация: все несуществующие пути обрабатывает index.php
        FallbackResource /index.php
    </Directory>

    # Безопасность: каталоги, в которые приложение загружает файлы (download,
    # templates/custom), не должны исполнять скрипты и не должны переопределяться
    # через .htaccess — иначе загруженный файл может стать исполняемым кодом (RCE).
    <Directory /var/www/integram/download>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>
    <Directory /var/www/integram/templates/custom>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/integram-error.log
    CustomLog ${APACHE_LOG_DIR}/integram-access.log combined
</VirtualHost>

# HTTPS. Если TLS не нужен — удалите или закомментируйте весь блок ниже.
<IfModule mod_ssl.c>
<VirtualHost *:443>
    DocumentRoot /var/www/integram

    SSLEngine on
    SSLCertificateFile /etc/integram/certs/local.crt
    SSLCertificateKeyFile /etc/integram/certs/local.key

    <Directory /var/www/integram>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    <Directory /var/www/integram/download>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>
    <Directory /var/www/integram/templates/custom>
        AllowOverride None
        Options -ExecCGI
        <FilesMatch "\.(php|php[0-9]*|phps|phtml|pht|phar|cgi|pl|fcgi|fpl|asp|jsp|sh|htaccess|htpasswd)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/integram-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/integram-ssl-access.log combined
</VirtualHost>
</IfModule>
